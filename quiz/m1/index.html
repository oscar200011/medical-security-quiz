<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大腸癌篩檢教材 · M1 圖卡集</title>
<style>
  :root{
    --pink:#ec4899; --pink-bg1:#fdf2f8; --pink-bg2:#fbcfe8;
    --teal:#0d9488; --teal-dark:#0f766e; --lock:#d1d5db;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(160deg,var(--pink-bg1),var(--pink-bg2));
    display:flex;flex-direction:column;align-items:center;
    user-select:none;overflow:hidden;
  }
  header{width:100%;max-width:1100px;padding:12px 16px 6px;display:flex;align-items:center;gap:10px}
  header h1{font-size:17px;color:var(--pink);font-weight:800;flex:1}
  #counter{font-weight:800;color:var(--pink);font-variant-numeric:tabular-nums;font-size:15px}
  #trackWrap{width:100%;max-width:1100px;padding:0 16px}
  #track{width:100%;height:6px;background:#fff;border-radius:99px;overflow:hidden;
         box-shadow:inset 0 1px 2px rgba(236,72,153,.15)}
  #fill{height:100%;width:0;background:linear-gradient(90deg,var(--pink),#f472b6);
        border-radius:99px;transition:width .25s ease}
  #stage{flex:1;width:100%;max-width:1100px;position:relative;display:flex;
         align-items:center;justify-content:center;padding:12px 16px;min-height:0;cursor:pointer}
  #frame{background:#fff;border-radius:20px;padding:8px;
         box-shadow:0 8px 30px rgba(236,72,153,.18);
         max-width:100%;max-height:100%;display:flex;align-items:center;justify-content:center}
  #pic{max-width:100%;max-height:calc(100vh - 190px);object-fit:contain;
       border-radius:14px;transition:opacity .18s ease;display:block}
  #pic.fading{opacity:0}
  .zone{position:absolute;top:0;bottom:0;width:20%;z-index:2}
  #zonePrev{left:0}#zoneNext{right:0}
  #zoomBtn{position:absolute;top:22px;right:26px;z-index:4;
           border:none;background:rgba(255,255,255,.92);color:var(--pink);
           width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;
           box-shadow:0 2px 10px rgba(236,72,153,.3)}
  #zoomBtn:active{transform:scale(.94)}
  #zoomBtn.pulse{animation:pulse 1.6s ease-in-out 3}
  @keyframes pulse{
    0%,100%{box-shadow:0 2px 10px rgba(236,72,153,.3)}
    50%{box-shadow:0 0 0 12px rgba(236,72,153,.25);transform:scale(1.12)}
  }
  #zoomHint{position:absolute;top:74px;right:20px;z-index:4;
            background:var(--pink);color:#fff;font-size:13px;font-weight:700;
            padding:8px 14px;border-radius:12px;pointer-events:none;
            opacity:0;transition:opacity .3s;white-space:nowrap;
            box-shadow:0 4px 14px rgba(236,72,153,.4)}
  #zoomHint::before{content:'';position:absolute;top:-6px;right:18px;
            border:6px solid transparent;border-bottom-color:var(--pink);border-top:none}
  #zoomHint.show{opacity:1}
  #zoomOverlay{display:none;position:fixed;inset:0;background:rgba(20,10,16,.96);z-index:100;
               flex-direction:column}
  #zoomOverlay.active{display:flex}
  #zoomBar{display:flex;align-items:center;gap:14px;padding:10px 16px;
           padding-top:calc(10px + env(safe-area-inset-top));justify-content:center}
  #zoomBar button{border:none;background:rgba(255,255,255,.15);color:#fff;
                  width:42px;height:42px;border-radius:50%;font-size:20px;font-weight:800;cursor:pointer}
  #zoomBar button:active{background:rgba(255,255,255,.3)}
  #zoomLevel{color:#fff;font-weight:700;min-width:56px;text-align:center;font-variant-numeric:tabular-nums}
  #zoomClose{margin-left:10px}
  #zoomScroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
  #zoomImg{display:block;margin:0 auto;width:100%}
  #tip{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
       background:rgba(236,72,153,.85);color:#fff;font-size:13px;
       padding:6px 16px;border-radius:999px;pointer-events:none;
       transition:opacity .5s;z-index:3;white-space:nowrap}
  footer{width:100%;max-width:1100px;padding:10px 16px;
         padding-bottom:calc(12px + env(safe-area-inset-bottom));
         display:flex;align-items:center;gap:12px}
  .nav{border:2px solid var(--pink);background:#fff;color:var(--pink);
       border-radius:999px;padding:10px 20px;font-size:15px;font-weight:700;cursor:pointer}
  .nav:active{transform:scale(.96)}
  .nav:disabled{opacity:.35;cursor:default}
  #spacer{flex:1}
  #goSite{border:none;border-radius:999px;padding:12px 26px;
          font-size:16px;font-weight:800;cursor:pointer;color:#fff;
          background:var(--lock);transition:background .3s, box-shadow .3s}
  #goSite.ready{background:linear-gradient(135deg,var(--teal),var(--teal-dark));
                box-shadow:0 6px 18px rgba(13,148,136,.35)}
  #goSite.ready:active{transform:scale(.97)}
</style>
</head>
<body>
<header>
  <h1>📖 大腸癌篩檢教材圖卡</h1>
  <span id="counter"></span>
</header>
<div id="trackWrap"><div id="track"><div id="fill"></div></div></div>

<div id="stage">
  <div class="zone" id="zonePrev"></div>
  <div class="zone" id="zoneNext"></div>
  <div id="frame"><img id="pic" alt="教材圖卡"></div>
  <button id="zoomBtn" title="放大檢視">🔍</button>
  <div id="zoomHint">字太小?點 🔍 放大看</div>
  <div id="tip">點擊或滑動翻頁 · 右上 🔍 可放大 · 看完全部即可測驗</div>
</div>

<footer>
  <button class="nav" id="btnPrev">‹ 上一頁</button>
  <button class="nav" id="btnNext">下一頁 ›</button>
  <span id="spacer"></span>
  <button id="goSite" disabled>🔒 尚餘 <span id="remain"></span> 張</button>
</footer>

<div id="zoomOverlay">
  <div id="zoomBar">
    <button id="zoomOut">−</button>
    <span id="zoomLevel">100%</span>
    <button id="zoomIn">＋</button>
    <button id="zoomClose">✕</button>
  </div>
  <div id="zoomScroll"><img id="zoomImg" alt="放大檢視"></div>
</div>

<script>
/* ================= 設定區 ================= */
const IMAGE_BASE = "";   // 圖卡與本頁同一個資料夾
const NEXT_URL   = "https://cmtpo-teacher-test.vercel.app/";   // 看完教材後前往考試站
/* ========================================== */

const CARDS = ["0-0-0.jpg", "0-0-1.jpg", "0-0-2.jpg", "0-0-3.jpg", "0-0-4.jpg", "0-0.jpg", "1-1.jpg", "1-2.jpg", "2-1.jpg", "2-2.jpg", "2-3.jpg", "3-1.jpg", "3-2.jpg", "3-3.1.jpg", "4-1.jpg", "4-2.jpg", "5-1.jpg", "5-2.jpg", "5-3.jpg", "6-1.jpg", "6-2.jpg", "6-3.jpg", "6-4.jpg", "6-5.1.jpg", "poster.jpg"];
let idx = 0;
const seen = new Set();
const pic = document.getElementById('pic');
const counter = document.getElementById('counter');
const fill = document.getElementById('fill');
const goSite = document.getElementById('goSite');
const remain = document.getElementById('remain');

const url = i => IMAGE_BASE + encodeURIComponent(CARDS[i]);
function preload(i){ if (i >= 0 && i < CARDS.length){ const im = new Image(); im.src = url(i); } }

function updateGate(){
  const left = CARDS.length - seen.size;
  if (left <= 0){
    goSite.disabled = false;
    goSite.classList.add('ready');
    goSite.innerHTML = '開始測驗 →';
  } else {
    remain.textContent = left;
  }
}

function show(i){
  idx = Math.max(0, Math.min(CARDS.length-1, i));
  pic.classList.add('fading');
  setTimeout(()=>{ pic.src = url(idx); pic.classList.remove('fading'); }, 90);
  seen.add(idx);
  counter.textContent = (idx+1) + ' / ' + CARDS.length;
  fill.style.width = (seen.size / CARDS.length * 100) + '%';
  document.getElementById('btnPrev').disabled = (idx === 0);
  document.getElementById('btnNext').disabled = (idx === CARDS.length-1);
  preload(idx+1); preload(idx+2);
  if (idx === CARDS.length-1) showZoomHint();
  updateGate();
}
const next = () => show(idx+1);
const prev = () => show(idx-1);

document.getElementById('zoneNext').onclick = next;
document.getElementById('zonePrev').onclick = prev;
pic.onclick = next;
document.getElementById('btnNext').onclick = next;
document.getElementById('btnPrev').onclick = prev;

goSite.onclick = () => {
  if (goSite.disabled) return;
  try { localStorage.setItem('m1_materials_read', String(Date.now())); } catch(e){}
  location.href = NEXT_URL;
};

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown'){ e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp'){ e.preventDefault(); prev(); }
});

let tx = null, ty = null;
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
stage.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)*1.5){ dx < 0 ? next() : prev(); }
  tx = ty = null;
}, {passive:true});

/* ---- 放大檢視 ---- */
const zoomOverlay = document.getElementById('zoomOverlay');
const zoomImg = document.getElementById('zoomImg');
const zoomLevelEl = document.getElementById('zoomLevel');
const LEVELS = [1, 1.5, 2, 3];
let zi = 0;

function applyZoom(){
  zoomImg.style.width = (LEVELS[zi] * 100) + '%';
  zoomLevelEl.textContent = Math.round(LEVELS[zi] * 100) + '%';
}
let zoomUsed = false;
const zoomHint = document.getElementById('zoomHint');
let hintTimer = null;
function showZoomHint(){
  if (zoomUsed) return;
  zoomHint.classList.add('show');
  document.getElementById('zoomBtn').classList.add('pulse');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(()=>{
    zoomHint.classList.remove('show');
    document.getElementById('zoomBtn').classList.remove('pulse');
  }, 5000);
}
function openZoom(){
  zoomUsed = true;
  zoomHint.classList.remove('show');
  document.getElementById('zoomBtn').classList.remove('pulse');
  zoomImg.src = url(idx);
  zi = 0;
  applyZoom();
  zoomOverlay.classList.add('active');
  document.getElementById('zoomScroll').scrollTop = 0;
}
function closeZoom(){ zoomOverlay.classList.remove('active'); }

document.getElementById('zoomBtn').onclick = e => { e.stopPropagation(); openZoom(); };
document.getElementById('zoomClose').onclick = closeZoom;
document.getElementById('zoomIn').onclick  = () => { if (zi < LEVELS.length-1){ zi++; applyZoom(); } };
document.getElementById('zoomOut').onclick = () => { if (zi > 0){ zi--; applyZoom(); } };
zoomImg.ondblclick = () => { zi = (zi + 1) % LEVELS.length; applyZoom(); };
document.addEventListener('keydown', e => {
  if (!zoomOverlay.classList.contains('active')) return;
  if (e.key === 'Escape') closeZoom();
});

setTimeout(()=>{ document.getElementById('tip').style.opacity = 0; }, 4000);
show(0);
</script>
</body>
</html>
