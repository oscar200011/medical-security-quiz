<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>醫療院所資安認證考試</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--card:#1a2236;--border:#1e3a5f;--accent:#00d4ff;--accent2:#00ff9d;--danger:#ff4d6a;--warn:#ffb830;--text:#e2e8f0;--muted:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
.screen{display:none;min-height:100vh;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* INTRO */
#intro-screen{padding:2rem;text-align:center;}
.logo-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,212,255,.1);border:1px solid var(--accent);border-radius:4px;padding:.4rem 1rem;font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--accent);letter-spacing:.1em;margin-bottom:1.5rem;animation:pulseBorder 2s ease-in-out infinite;}
@keyframes pulseBorder{0%,100%{box-shadow:0 0 10px rgba(0,212,255,.2);}50%{box-shadow:0 0 25px rgba(0,212,255,.5);}}
.main-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;line-height:1.1;margin-bottom:.4rem;background:linear-gradient(135deg,#fff 0%,var(--accent)50%,var(--accent2)100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{font-size:1rem;color:var(--muted);margin-bottom:2rem;font-weight:300;}
.video-container{width:100%;max-width:680px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.25rem;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.video-wrapper{position:relative;width:100%;padding-bottom:56.25%;background:#000;}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1b2a,#1a2a3a);gap:.8rem;}
.video-icon{width:72px;height:72px;background:rgba(0,212,255,.15);border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;animation:breathe 2s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.video-lbl{font-family:'Share Tech Mono',monospace;color:var(--accent);font-size:.8rem;letter-spacing:.1em;}
.video-footer{padding:.875rem 1.5rem;background:rgba(0,212,255,.05);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.video-time{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--accent);}
.prog-wrap{flex:1;margin:0 1rem;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;width:0%;transition:width .5s linear;}
.video-status{font-size:.8rem;color:var(--muted);text-align:right;min-width:80px;}
.watch-req{background:rgba(255,184,48,.1);border:1px solid rgba(255,184,48,.3);border-radius:8px;padding:.65rem 1.25rem;font-size:.82rem;color:var(--warn);margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem;}
.reg-card{width:100%;max-width:680px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem 1.75rem;margin-bottom:1.25rem;transition:opacity .3s;}
.reg-card.locked{opacity:.35;pointer-events:none;}
.reg-title{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--accent);letter-spacing:.1em;margin-bottom:1rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;}
.fg{display:flex;flex-direction:column;gap:.35rem;}
.fg.full{grid-column:1/-1;}
.flabel{font-size:.78rem;color:var(--muted);font-weight:500;letter-spacing:.02em;}
.flabel span{color:var(--danger);margin-left:2px;}
.finput,.fsel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:.6rem .85rem;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:.88rem;transition:border-color .2s,box-shadow .2s;width:100%;}
.finput:focus,.fsel:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
.finput::placeholder{color:var(--muted);}
.fsel option{background:#1a2236;color:var(--text);}
.returning-banner{width:100%;max-width:680px;background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.25);border-radius:8px;padding:.75rem 1.25rem;margin-bottom:1rem;font-size:.85rem;color:var(--accent2);display:none;align-items:center;gap:.5rem;}
.start-btn{padding:.9rem 2.8rem;font-size:1.05rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0f1e;border:none;border-radius:8px;cursor:pointer;transition:all .3s;}
.start-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
.start-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,.4);}

/* QUIZ */
#quiz-screen{padding:1.5rem;align-items:stretch;}
.quiz-layout{width:100%;max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:1.25rem;}
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.q-counter{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--accent);}
.q-counter span{font-size:1.3rem;font-weight:bold;color:#fff;}
.q-type-tag{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent);font-size:.72rem;padding:.2rem .65rem;border-radius:4px;font-family:'Share Tech Mono',monospace;}
.ans-count{font-size:.78rem;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.prog-overall{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.prog-overall-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;}
.nav-dots{display:flex;flex-wrap:wrap;gap:.4rem;padding:.875rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.ndot{width:30px;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:var(--muted);font-size:.72rem;font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.ndot:hover{border-color:var(--accent);color:var(--accent);}
.ndot.answered{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.35);color:var(--accent);}
.ndot.current{background:var(--accent);border-color:var(--accent);color:#0a0f1e;font-weight:bold;}
/* 情境背景區塊 */
.context-box{background:rgba(255,184,48,.06);border:1px solid rgba(255,184,48,.2);border-radius:10px;padding:1rem 1.25rem;}
.context-label{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--warn);letter-spacing:.08em;margin-bottom:.4rem;}
.context-title{font-size:.92rem;font-weight:700;color:var(--warn);margin-bottom:.4rem;}
.context-body{font-size:.85rem;line-height:1.7;color:#b8a060;white-space:pre-line;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.75rem;position:relative;overflow:hidden;}
.q-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));}
.q-text{font-size:1rem;line-height:1.8;font-weight:500;padding-left:.5rem;}
.opts-grid{display:flex;flex-direction:column;gap:.65rem;}
.opt-btn{width:100%;text-align:left;padding:.9rem 1.1rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:.92rem;line-height:1.6;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:.7rem;}
.opt-btn:hover{background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.3);transform:translateX(3px);}
.opt-btn.sel{background:rgba(0,212,255,.12);border-color:var(--accent);color:#fff;}
.opt-key{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--accent);min-width:1.4rem;padding-top:.1rem;font-weight:bold;}
.opt-btn.sel .opt-key{color:var(--accent2);}
.quiz-footer{display:flex;justify-content:space-between;align-items:center;gap:.75rem;}
.btn-nav{padding:.65rem 1.4rem;font-size:.88rem;font-weight:600;font-family:'Noto Sans TC',sans-serif;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--text);border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-nav:hover{background:rgba(255,255,255,.1);}
.btn-nav:disabled{opacity:.25;cursor:not-allowed;}
.btn-submit{padding:.65rem 2rem;font-size:.95rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0f1e;border:none;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,255,.3);}
.btn-submit:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* RESULT */
#result-screen{padding:2rem;text-align:center;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;max-width:580px;width:100%;position:relative;overflow:hidden;}
.result-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(0,212,255,.05) 0%,transparent 60%);pointer-events:none;}
.score-ring{width:148px;height:148px;margin:0 auto 1.75rem;position:relative;}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-num{font-size:2.4rem;font-weight:900;line-height:1;}
.score-lbl{font-size:.75rem;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.result-title{font-size:1.7rem;font-weight:900;margin-bottom:.4rem;}
.result-msg{color:var(--muted);margin-bottom:1.75rem;font-size:.92rem;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem;margin-bottom:1.75rem;}
.stat-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:.875rem .5rem;}
.stat-val{font-size:1.7rem;font-weight:900;font-family:'Share Tech Mono',monospace;}
.stat-lbl{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
.pass{color:var(--accent2);}
.fail{color:var(--danger);}

/* Email section — only for passing */
.email-section{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;text-align:left;}
.email-sec-title{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--accent);letter-spacing:.07em;margin-bottom:.75rem;}
.email-row{display:flex;gap:.65rem;align-items:center;}
.email-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:.6rem .85rem;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:.88rem;}
.email-inp:focus{outline:none;border-color:var(--accent);}
.btn-send{padding:.6rem 1.4rem;font-size:.88rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0f1e;border:none;border-radius:6px;cursor:pointer;white-space:nowrap;}
.btn-send:disabled{opacity:.45;cursor:not-allowed;}
.email-note{font-size:.72rem;color:var(--muted);margin-top:.45rem;}
.email-status{font-size:.78rem;margin-top:.45rem;padding:.35rem .7rem;border-radius:4px;display:none;}
.es-ok{color:var(--accent2);background:rgba(0,255,157,.08);}
.es-err{color:var(--danger);background:rgba(255,77,106,.08);}

.result-btns{display:flex;justify-content:center;gap:.875rem;flex-wrap:wrap;}
.btn-primary{padding:.8rem 1.8rem;font-size:.95rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0f1e;border:none;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,255,.3);}
.btn-secondary{padding:.8rem 1.8rem;font-size:.95rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{background:rgba(0,212,255,.1);}

/* REVIEW */
#review-screen{padding:1.5rem;align-items:stretch;}
.review-layout{width:100%;max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:1.25rem;}
.review-hdr{text-align:center;padding:1.25rem;background:var(--card);border:1px solid var(--border);border-radius:12px;}
.review-hdr h2{font-size:1.4rem;font-weight:900;margin-bottom:.25rem;}
.review-hdr p{color:var(--muted);font-size:.88rem;}
.rv-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;position:relative;overflow:hidden;}
.rv-item.ci{border-color:rgba(0,255,157,.3);}
.rv-item.wi{border-color:rgba(255,77,106,.3);}
.rv-item::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;}
.rv-item.ci::before{background:var(--accent2);}
.rv-item.wi::before{background:var(--danger);}
.rv-ctx{background:rgba(255,184,48,.05);border:1px solid rgba(255,184,48,.15);border-radius:6px;padding:.7rem .9rem;margin-bottom:.9rem;}
.rv-ctx-lbl{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--warn);letter-spacing:.08em;margin-bottom:.3rem;}
.rv-ctx-txt{font-size:.8rem;line-height:1.6;color:#9a8040;white-space:pre-line;}
.rv-qhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.9rem;gap:.75rem;}
.rv-qnum{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--muted);white-space:nowrap;padding-top:.1rem;}
.rv-qtext{font-size:.92rem;line-height:1.7;font-weight:500;flex:1;}
.badge{font-size:.72rem;padding:.18rem .55rem;border-radius:4px;font-weight:700;white-space:nowrap;}
.bc{background:rgba(0,255,157,.15);color:var(--accent2);border:1px solid rgba(0,255,157,.3);}
.bw{background:rgba(255,77,106,.15);color:var(--danger);border:1px solid rgba(255,77,106,.3);}
.rv-opts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.9rem;}
.rv-opt{padding:.55rem .9rem;border-radius:6px;font-size:.85rem;line-height:1.6;display:flex;gap:.65rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);color:var(--muted);}
.rv-opt.oc{background:rgba(0,255,157,.07);border-color:rgba(0,255,157,.22);color:var(--accent2);}
.rv-opt.ow{background:rgba(255,77,106,.07);border-color:rgba(255,77,106,.22);color:var(--danger);}
.rv-key{font-family:'Share Tech Mono',monospace;font-size:.78rem;font-weight:bold;min-width:1.2rem;}
.exp-box{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.14);border-radius:8px;padding:.9rem 1.1rem;}
.exp-lbl{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--accent);letter-spacing:.1em;margin-bottom:.35rem;}
.exp-txt{font-size:.83rem;line-height:1.8;color:#94a3b8;white-space:pre-line;}
.rv-actions{display:flex;justify-content:center;gap:.875rem;padding-bottom:2rem;flex-wrap:wrap;}

/* CERT MODAL */
.cert-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem;}
.cert-overlay.show{display:flex;}
.cert-modal{background:#fff;border-radius:12px;overflow:hidden;max-width:560px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.6);}
#cert-canvas{display:block;width:100%;height:auto;}
.cert-btns{padding:.875rem 1.25rem;background:#f5f0e0;display:flex;justify-content:center;gap:.75rem;border-top:1px solid #ddd;}
.btn-dl{padding:.6rem 1.4rem;font-size:.88rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#c8883a,#e8b84b);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.btn-close-cert{padding:.6rem 1.4rem;font-size:.88rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;background:transparent;color:#666;border:1px solid #ccc;border-radius:6px;cursor:pointer;}

/* misc */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:floatUp linear infinite;}
@keyframes floatUp{0%{opacity:0;transform:translateY(100vh)scale(0);}10%{opacity:.6;}90%{opacity:.2;}100%{opacity:0;transform:translateY(-10vh)scale(1);}}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-p{position:absolute;top:-20px;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh)rotate(720deg);opacity:0;}}
.scanline{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3;animation:scan 4s linear infinite;pointer-events:none;z-index:0;}
@keyframes scan{0%{top:0;}100%{top:100vh;}}
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr;}.fg.full{grid-column:1;}
  .nav-dots{gap:.3rem;}.ndot{width:26px;height:26px;font-size:.68rem;}
  .stats-grid{gap:.5rem;}.stat-val{font-size:1.4rem;}
  .result-card{padding:2rem 1.25rem;}
  .result-btns{gap:.6rem;}
}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="particles" id="particles"></div>
<div class="confetti-c" id="confetti"></div>

<!-- ══ INTRO ══ -->
<div class="screen active" id="intro-screen">
  <div class="logo-badge">⬡ 衛福部 · 醫療資安認證系統 v3.1</div>
  <h1 class="main-title">醫療院所資安<br>認證考試</h1>
  <p class="subtitle">填寫資料後觀看影片，即可開始考試</p>

  <div class="video-container">
    <div class="video-wrapper">
      <iframe id="yt-player"
        src="https://www.youtube.com/embed/DFZz7HwOGbs?enablejsapi=1&rel=0&modestbranding=1"
        style="position:absolute;inset:0;width:100%;height:100%;border:0;"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
    <div class="video-footer">
      <div class="video-time" id="vtime">觀看中...</div>
      <div class="prog-wrap"><div class="prog-fill" id="vprog"></div></div>
      <div class="video-status" id="vstatus">請觀看影片</div>
    </div>
  </div>

  <div class="watch-req">⚠ 請填寫下方資料，並觀看至少 <strong>&nbsp;80%&nbsp;</strong> 影片後，即可開始考試</div>

  <div class="returning-banner" id="returning-banner">
    ✓ 已找到您的作答紀錄，免重新觀看影片，可直接開始考試！
  </div>

  <div class="reg-card" id="reg-card">
    <div class="reg-title">// 考生資料登錄</div>
    <div class="form-grid">
      <div class="fg full">
        <label class="flabel">診所名稱（全名）<span>*</span></label>
        <input class="finput" id="f-clinic" type="text" placeholder="例：臺南市安南區某某診所" oninput="onFormInput()">
      </div>
      <div class="fg">
        <label class="flabel">機構代碼<span>*</span></label>
        <input class="finput" id="f-code" type="text" placeholder="例：3301234567" oninput="onFormInput()">
      </div>
      <div class="fg">
        <label class="flabel">姓名<span>*</span></label>
        <input class="finput" id="f-name" type="text" placeholder="請輸入真實姓名" oninput="onFormInput()">
      </div>
      <div class="fg">
        <label class="flabel">職稱<span>*</span></label>
        <select class="fsel" id="f-title" onchange="onFormInput()">
          <option value="">── 請選擇職稱 ──</option>
          <option value="醫師">醫師</option>
          <option value="護理師">護理師</option>
          <option value="藥師">藥師</option>
          <option value="行政人員">行政人員</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
  </div>

const THEME_Q=[{"question": "關於醫事人員卡（HCA Card）的使用規範，下列敘述何者最符合現行法規的要求？", "options": {"A": "A. 因為診所業務繁忙，醫師可以將卡片與密碼交給資深護理師，以加速轉診單開立效率。", "B": "B. 醫事人員卡視同醫師在數位世界的「印鑑證明」，應親自插卡並輸入密碼，嚴禁出借。", "C": "C. 若護理師已有簽署保密協定，醫師即可授權其使用自己的醫事人員卡進行電子簽章。", "D": "D. 為了避免遺失，卡片應統一交由診所行政主管保管，需要時再由主管統一插卡。"}, "answer": "B", "explanation": "核心觀念：依據《電子病歷製作及管理辦法》及教材鐵律一，醫事人員卡之電子簽章具備法律上的「不可否認性」。這意味著卡片簽署的任何文件，在法律上都被視為本人親自簽署。 \n錯誤選項分析：\n        選項 A：雖然實務上常見，但這是極高風險的違規行為。若發生醫療糾紛或健保申報錯誤，醫師將難以主張「非本人操作」。\n        選項 C：保密協定屬於民事契約，無法凌駕於《電子簽章法》與《刑法》關於偽造文書的規範之上。\n        選項 D：集中保管反而增加了卡片遭盜用或混用的風險，且剝奪了醫事人員對自身憑證的控制權。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "醫師在看診結束暫時離開診間時，關於電腦與醫事人員卡的操作，下列何者為正確的資安行為？", "options": {"A": "A. 將卡片留在讀卡機內，方便下一位醫師接手使用。", "B": "B. 拔除醫事人員卡並隨身攜帶，電腦螢幕設定自動鎖定或登出系統。", "C": "C. 僅關閉螢幕電源，卡片留在讀卡機內以免遺失。", "D": "D. 請跟診護理師幫忙保管卡片，放置於鍵盤下方。"}, "answer": "B", "explanation": "核心觀念：「卡不離身」是教材強調的鐵律。離開座位未拔卡或未鎖定螢幕，極易導致他人冒用身分進行非法操作或查詢，違反《個人資料保護法》之安全維護措施 。\n實務指引：螢幕保護程式應設定為 15 分鐘內（或更短）自動鎖定，這是《基層醫療院所資安防護參考指引》中的明確要求。\n", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "醫師結束看診準備下班離開診所時，對於醫事人員卡(HCA)的保管，下列哪種做法最符合資安規範？", "options": {"A": "A. 留在讀卡機內不要拔，避免明天上班找不到，且關機就不會被盜用。", "B": "B. 為了避免醫師忘記帶卡，應統一交由掛號櫃台行政人員集中鎖在保險箱保管。", "C": "C. 應視同個人實體印鑑或身分證，由醫師本人隨身攜帶保管，不應留置於診所。", "D": "D. 藏在診間鍵盤下方或抽屜深處，只有自己知道的位置。"}, "answer": "C", "explanation": "核心觀念：依據《電子簽章法》精神，醫事人員卡代表醫師在數位空間的「人格權」。既然是數位分身，就應如同身分證一樣「隨身保管」。留置於診所內（即使是藏起來或鎖保險箱）都增加了被內部人員盜用或調包的風險。\n風險提示：      \n      選項B：雖然看似安全，但「集中保管」破壞了「專屬控管」原則。若行政人員持有保險箱鑰匙，即擁有接觸所有醫師憑證的機會，一旦發生盜用，責任歸屬將難以釐清。\n      選項A與D：這是實務上最常見的違規。攻擊者（或內鬼）只要開啟電腦或翻找抽屜，就能輕易取得卡片進行非法操作。\n", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "若診所發生醫事人員卡遺失事件，第一時間應採取的正確行動為何？", "options": {"A": "A. 先在診所內尋找三天，若找不到再處理。", "B": "B. 借用其他醫師的卡片暫時頂替，以免影響看診。", "C": "C. 立即向憑證管理中心（HCA）申請廢止憑證並申請補發，同時通報院內主管。", "D": "D. 在社群媒體發文詢問是否有病患撿到。"}, "answer": "C", "explanation": "核心觀念：憑證遺失等同於印鑑遺失，存在極高盜用風險。應立即廢止憑證以阻斷法律效力。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "為了方便記憶，醫師將醫事人員卡的 PIN 碼設定為「000000」或出生年月日，這違反了資安防護的哪項原則？", "options": {"A": "A. 完整性原則。", "B": "B. 弱密碼管理原則。", "C": "C. 網路隔離原則。", "D": "D. 最小權限原則。"}, "answer": "B", "explanation": "核心觀念：依據《基層醫療院所資安防護參考指引》，密碼應具備足夠強度，避免使用預設值（如 000000）或容易被猜測的資訊（如生日）。弱密碼極易遭駭客暴力破解或被熟人猜中 。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "關於醫事人員卡（HCA）的法律性質，下列描述何者正確？", "options": {"A": "A. 僅是診所內部的識別證，無法律效力。", "B": "B. 是電子簽章法認可的憑證，使用該卡簽署的電子病歷具有與紙本簽名同等的法律效力。", "C": "C. 只是用來登入健保 VPN 的工具，與電子病歷無關。", "D": "D. 是醫師公會發行的紀念卡。"}, "answer": "B", "explanation": "法規依據：《電子病歷製作及管理辦法》第 3、4、6 條明定，電子病歷之製作與修正應以電子簽章為之，且該簽章應憑中央主管機關核發之醫事人員憑證進行。因此，HCA 卡是醫療行為合法性的數位基石 。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "當醫師更換診所執業時，關於他在原診所的系統帳號權限，應如何處理？", "options": {"A": "A. 保留帳號，方便他隨時回來查資料。", "B": "B. 將帳號轉給接手的新醫師繼續使用。", "C": "C. 應立即停用或刪除該帳號權限。", "D": "D. 將帳號密碼公開給所有護理師共用。"}, "answer": "C", "explanation": "資安原則：帳號生命週期管理要求「離職即停用」。保留離職員工帳號（Ghost Account）是常見的資安破口，可能導致資料外洩或被惡意利用，且診所將難以追究責任 。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "護理師小美發現醫師將 HCA 卡插在電腦上就去上廁所了，此時有一筆急件轉診單要送出，小美應該？", "options": {"A": "A. 直接幫醫師按傳送，反正是為了公務。", "B": "B. 拔出卡片，等醫師回來請他重新插卡操作。", "C": "C. 打電話問醫師密碼是多少。", "D": "D. 請行政人員來幫忙按。"}, "answer": "B", "explanation": "行為準則：任何非本人操作 HCA 卡的行為都涉及違法風險。正確做法是保護卡片安全（拔出保管或鎖定螢幕），並堅持由醫師本人完成簽章程序，確保程序的合法性 。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "在輸入 HCA 卡密碼時，若有病患或家屬在旁，應注意什麼？", "options": {"A": "A. 大聲唸出密碼以免輸錯。", "B": "B. 請對方幫忙輸入。", "C": "C. 注意遮蔽，避免密碼被窺視（Shoulder Surfing）。", "D": "D. 無所謂，反正他們也記不住。"}, "answer": "C", "explanation": "實體安全：旁人窺視（Shoulder Surfing）是社交工程攻擊的一種。醫療人員應養成輸入密碼時進行遮蔽的習慣，這是最基本的資安素養。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "如果醫師忘記帶 HCA 卡，可以使用哪種方式進行轉診平台操作？", "options": {"A": "A. 使用診所共用的公務帳號登入（若平台支援）。", "B": "B. 借用護理長的卡片。", "C": "C. 請另一位有帶卡的醫師協助，以該醫師的名義進行操作與負責。", "D": "D. 使用身分證字號產生器騙過系統。"}, "answer": "C", "explanation": "權責相符：若必須進行醫療行為與紀錄，應由實際操作且具備資格的人員以其本人憑證進行，並承擔相應責任。借用他人卡片或使用虛假身分均屬違規。若平台支援無卡操作（如僅查詢），則依權限行使，但涉及簽章之行為必須有卡 。", "type": "主題一", "context": "醫事人員卡（HCA）與身分認證管理"}, {"question": "本計畫要求診所與轉診平台之間的資料傳輸，必須透過下列哪種方式進行，以確保資料不落地與加密傳輸？", "options": {"A": "A. 使用一般的 Google Drive 雲端硬碟分享連結。", "B": "B. 透過私人 LINE 群組傳送檔案。", "C": "C. 使用計畫指定的 VPN（虛擬私人網路）專用通道與 TLS 加密傳輸。", "D": "D. 將資料存入 USB 隨身碟，請快遞送至醫院。"}, "answer": "C", "explanation": "核心觀念：依據計畫契約義務（Layer 2），所有敏感個資交換必須透過 VPN 封閉網路進行，且 Web Service 需採 TLS 1.2 以上加密。\n錯誤選項分析：選項 A、B 均透過公開網際網路傳輸，且伺服器位於境外或無法由計畫管控，極易發生個資外洩或攔截，嚴重違反資安規範 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "關於診所電腦的「網路隔離」措施，下列敘述何者正確？", "options": {"A": "A. 連接健保 VPN 的電腦，同時也可以用來讓員工觀看 YouTube 或瀏覽購物網站。", "B": "B. 為了方便，診所內部的醫療作業網路可以開放給候診民眾連接 WiFi。", "C": "C. 連接健保 VPN 與轉診平台的電腦應「專機專用」，不應連接一般網際網路（Internet）。", "D": "D. 只要安裝了免費防毒軟體，網路混用就沒有風險。"}, "answer": "C", "explanation": "核心觀念：教材強調「專機專用」與「網路分家」。健保 VPN 電腦若同時連接一般外網（Internet），極易成為駭客透過釣魚網頁植入勒索病毒的跳板，進而感染健保醫療網。這是基層資安指引中最核心的建議 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "診所行政人員小美為了節省手機流量，將自己的手機透過 USB 線連接到掛號用的電腦進行充電並開啟「USB 網路共享」，此行為主要的資安風險為何？", "options": {"A": "A. 會導致電腦電力不足。", "B": "B. 會破壞電腦的網路隔離機制，形成資安破口，讓外部病毒有機可乘。", "C": "C. 會造成健保卡讀卡機故障。", "D": "D. 不會有任何風險，是合理的資源利用。"}, "answer": "B", "explanation": "技術原理解析：此行為稱為「私接網路設備」。當內部電腦透過手機 4G/5G 上網時，即繞過了診所防火牆的保護，且手機本身可能已感染惡意程式，這打破了物理或邏輯隔離的防線 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "依據《基層醫療院所資安防護參考指引》，對於診所內提供民眾使用的 WiFi，應採取何種設置？", "options": {"A": "A. 與診所醫療作業系統使用同一個無線基地台與密碼。", "B": "B. 應與內部作業電腦網段進行實體或邏輯隔離（Guest Network）。", "C": "C. 設定為無密碼開放空間，方便民眾連線。", "D": "D. 要求民眾必須輸入身分證字號才能連線。"}, "answer": "B", "explanation": "網路架構：訪客網路（Guest WiFi）必須與醫療內網（Intranet）完全隔離。若混用網段，惡意攻擊者可偽裝成病患，透過 WiFi 掃描並攻擊診所內部的伺服器或電腦（如勒索病毒橫向移動）。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "在轉診資料傳輸過程中，若瀏覽器網址列出現「不安全」或「憑證錯誤」的警示，正確的處理方式為何？", "options": {"A": "A. 忽略警告，點擊「繼續前往」並輸入帳號密碼。", "B": "B. 立即停止操作，不輸入任何資料，並通報系統維護廠商檢查 TLS 憑證。", "C": "C. 重新開機後再試一次，若還有警告就當作沒看到。", "D": "D. 改用手機網路連線試試看。"}, "answer": "B", "explanation": "加密傳輸：HTTPS 加密（鎖頭圖示）與 TLS 憑證是確保資料在傳輸中不被竊聽的基本機制。憑證錯誤可能代表遭到「中間人攻擊（MITM）」或連線至偽造的釣魚網站。繼續操作可能導致帳密與個資外洩 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "為什麼診所的 VPN 電腦不應該用來瀏覽社群網站（如 Facebook）？", "options": {"A": "A. 因為老闆怕員工偷懶。", "B": "B. 因為社群網站充滿了社交工程陷阱與惡意連結，容易導致電腦中毒。", "C": "C. 因為會佔用太多頻寬導致掛號系統變慢。", "D": "D. 因為社群網站會偷看病歷。"}, "answer": "B", "explanation": "風險來源：雖然 A 與 C 也是管理上的考量，但從資安角度（本課程重點），社群網站是惡意程式傳播的主要途徑之一（如 Clickjacking）。專機專用的核心目的就是為了阻絕這類來自外部網路的威脅 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "診所計畫自行開發 API 介接轉診平台，依據規範，必須使用何種版本的加密協定？", "options": {"A": "A. TLS 1.0。", "B": "B. SSL 3.0。", "C": "C. TLS 1.2 或以上。", "D": "D. HTTP 明文傳輸。"}, "answer": "C", "explanation": "技術規範：舊版的 SSL 與 TLS 1.0/1.1 已被證實存在嚴重漏洞（如 POODLE, BEAST）。計畫資安規範明確要求所有資料交換必須強制使用 TLS 1.2 以上之加密協定，以符合當前的資安標準 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "關於遠端桌面連線（Remote Desktop）的使用，下列何者符合最佳實務？", "options": {"A": "A. 開放 AnyDesk 且不設密碼，方便廠商隨時維修。", "B": "B. 使用 Windows 內建 RDP 並開放給所有 IP 連線。", "C": "C. 應避免非必要的遠端連線；若必須使用，應透過 VPN 並設定強密碼與限制來源 IP。", "D": "D. 將遠端連線埠號（Port 3389）公告在官網上。"}, "answer": "C", "explanation": "攻擊途徑：RDP（遠端桌面協定）是勒索病毒最常見的入侵管道之一。無限制的遠端連線等同於對駭客敞開大門。透過 VPN 包裹 RDP 並限制來源 IP 才是安全的做法 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "診所內部網路的交換器（Switch）與路由器（Router）管理帳號，應該如何設定？", "options": {"A": "A. 使用原廠預設帳密（如 admin/admin）。", "B": "B. 密碼寫在機器底部。", "C": "C. 修改預設帳密，設定高強度密碼，並限制僅有管理者電腦可登入。", "D": "D. 不用設定密碼。"}, "answer": "C", "explanation": "設備管理：網路設備是診所資安的第一道防線。若使用預設密碼，駭客可輕易取得網路控制權，進行流量監聽（Sniffing）或 DNS 劫持 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "當診所電腦需要連線至一般網際網路查詢醫學資料時，建議採取何種方式以落實網路隔離？", "options": {"A": "A. 直接用掛號主機切換視窗查詢。", "B": "B. 另外準備一台不連接診所內網、僅連接外網（Guest WiFi）的獨立電腦或平板供查詢使用。", "C": "C. 先拔掉健保卡再查詢。", "D": "D. 安裝兩個瀏覽器，一個看病歷，一個查資料。"}, "answer": "B", "explanation": "物理隔離：這是最徹底的隔離方式。將高風險的上網行為（查詢資料、收私人信件）移至完全獨立的設備上，確保即便該設備中毒，也不會波及到診所的核心醫療網路 。", "type": "主題二", "context": "網路隔離與 VPN 傳輸安全"}, {"question": "診所新安裝了一台無線網路監視器（IP Camera），為了方便記憶，院長決定維持原廠預設密碼（如 admin/1234）。此行為違反了哪一項資安最佳實務？", "options": {"A": "A. 設備報廢管理原則。", "B": "B. 修改預設帳號密碼原則。", "C": "C. 軟體合法授權原則。", "D": "D. 無紙化作業原則。"}, "answer": "B", "explanation": "核心觀念：依據衛福部指引及教材「鐵律三」，IoT 設備（監視器、印表機）是駭客入侵的常見破口。全球有專門搜尋引擎（如 Shodan）可掃描預設密碼設備。未改密碼極易導致診所影像外流或成為跳板攻擊內網 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "關於診所電腦作業系統的維護，下列何者為高風險行為？", "options": {"A": "A. 設定作業系統自動下載並安裝安全性更新。", "B": "B. 繼續使用微軟已停止支援（EOS）的 Windows 7 系統連網作業。", "C": "C. 安裝付費版防毒軟體並每日更新病毒碼。", "D": "D. 定期備份重要資料至離線硬碟。"}, "answer": "B", "explanation": "漏洞風險：已停止支援（End of Support）的作業系統亦即廠商不再修補安全漏洞。駭客可利用已知漏洞輕易攻陷電腦，這是 WannaCry 等勒索病毒災情慘重的主因之一 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "診所印表機具備無線列印功能，為了資安考量，下列哪項設定是必要的？", "options": {"A": "A. 開放給所有網段均可存取，方便列印。", "B": "B. 設定存取密碼，並限制僅有診所內部網段可以連線列印。", "C": "C. 將印表機放在診所門口方便民眾使用。", "D": "D. 使用原廠預設的管理者密碼。"}, "answer": "B", "explanation": "設備風險：多功能事務機（MFP）本身就是一台電腦，若未設定權限與更改密碼，駭客可竊取列印暫存檔中的病歷資料，或將其作為攻擊跳板。限制存取來源與更改密碼是基本防護 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "關於電腦螢幕保護程式的設定，衛福部資安指引建議閒置多久應自動鎖定？", "options": {"A": "A. 1 小時。", "B": "B. 30 分鐘。", "C": "C. 15 分鐘或更短。", "D": "D. 不需要設定，方便隨時查看。"}, "answer": "C", "explanation": "實體防護：縮短螢幕鎖定時間可減少人員離開座位時，電腦遭未授權人員（如清潔人員、擅入診間的病患）操作的風險。指引明確建議設定為 15 分鐘以內 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "診所報廢舊電腦主機時，對於硬碟的處理，下列何者符合資安規範？", "options": {"A": "A. 直接丟給資源回收車。", "B": "B. 格式化一次後就賣給二手商。", "C": "C. 僅刪除桌面上的檔案。", "D": "D. 進行物理銷毀（如鑽孔、破壞）或使用專業消磁設備，確保資料無法復原。"}, "answer": "D", "explanation": "資料銷毀：單純刪除或快速格式化，資料仍可透過軟體救援回來。依據指引，含有敏感個資的儲存媒體必須進行物理銷毀或徹底消磁，以確保資料永久無法讀取，防止資料外洩 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "診所的掛號電腦應該安裝防毒軟體嗎？", "options": {"A": "A. 不用，因為有健保 VPN 保護。", "B": "B. 要，且必須保持病毒碼更新至最新狀態。", "C": "C. 只要不裝盜版軟體就不用防毒。", "D": "D. 只有上網看影片的電腦才要裝。"}, "answer": "B", "explanation": "端點防護：防毒軟體是端點安全的基本配備。即使有 VPN，隨身碟（USB）或內部網路傳播仍可能帶來病毒。指引明確要求電腦需安裝防毒軟體並定期更新 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "關於 USB 隨身碟的使用，下列哪種做法是安全的？", "options": {"A": "A. 隨意使用病患提供的 USB 隨身碟讀取資料。", "B": "B. 員工可使用私人 USB 在診所電腦與家中電腦間傳輸檔案。", "C": "C. 嚴格管制 USB 使用，若必須使用，應先掃毒並進行加密，且僅限公務用隨身碟。", "D": "D. 將診所電腦的 USB 孔全部封死，完全不准用。"}, "answer": "C", "explanation": "移動媒體管理：USB 是病毒傳播的重要途徑。雖然 D 選項最安全，但在實務上可能不可行。C 選項是兼顧安全與實務的管理措施，符合資安指引建議 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "診所使用的醫療資訊系統（HIS），若廠商發布了軟體更新修補漏洞，應如何處理？", "options": {"A": "A. 忽視它，因為更新可能會讓系統不穩定。", "B": "B. 等到駭客攻擊後再更新。", "C": "C. 在確認相容性後，儘速安排更新以修補已知漏洞。", "D": "D. 要求廠商不要更新。"}, "answer": "C", "explanation": "漏洞修補：軟體更新通常包含安全漏洞的修補。延遲更新會讓系統暴露在已知風險中。正確流程是先確認備份與相容性，然後儘速更新 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "診所內的數位看板（播放衛教影片的電視）若是聯網設備，是否需要資安管理？", "options": {"A": "A. 不需要，它只是電視。", "B": "B. 需要，因為它連接診所網路，若被駭客入侵可能播放不雅內容或攻擊內網。", "C": "C. 只要拔掉網路線就好。", "D": "D. 只有觸控式的才需要。"}, "answer": "B", "explanation": "IoT 風險：數位看板亦屬於 IoT 設備。曾發生多起看板被駭播放不雅影片的案例，不僅損害診所形象，更可能成為內網攻擊跳板。應納入資安盤點範圍 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "為了防止電腦被未授權使用，除了密碼外，還可以採取什麼實體安全措施？", "options": {"A": "A. 將電腦鎖在保險箱裡。", "B": "B. 使用 Kensington 防盜鎖將筆電鎖在桌上，並將主機置於櫃台內側不易觸碰處。", "C": "C. 在電腦上貼「請勿觸摸」的貼紙。", "D": "D. 派保全 24 小時看守。"}, "answer": "B", "explanation": "實體安全：對於開放空間（如櫃台）的設備，防盜鎖與位置安排（螢幕不對外、主機不外露）是低成本且有效的防護措施 。", "type": "主題三", "context": "設備安全與 IoT 管理"}, {"question": "關於密碼設定的強度，下列建議何者符合資安指引？", "options": {"A": "A. 越短越好，方便輸入。", "B": "B. 使用英文名字加上生日。", "C": "C. 至少 8 個字元以上，混合大小寫字母、數字及特殊符號。", "D": "D. 全診所統一使用 \"Clinic1234\"。"}, "answer": "C", "explanation": "密碼複雜度：強密碼能大幅增加暴力破解的時間成本。混合字符與足夠長度是基本要求。1 明確建議「至少 8 字元、混合三種字符」。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "診所行政人員小陳因為總是忘記密碼，所以把密碼寫在便條紙上貼在螢幕邊框，這違反了什麼原則？", "options": {"A": "A. 桌面淨空原則（Clear Desk Policy）與密碼保密原則。", "B": "B. 節約用紙原則。", "C": "C. 辦公室美觀原則。", "D": "D. 資訊公開原則。"}, "answer": "A", "explanation": "密碼管理：將密碼明文展示在顯眼處，使得密碼設定形同虛設。任何經過的人（包含病患、外送員）都能輕易取得權限。這是最常見但也最危險的人為疏失 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "診所聘請了新的工讀生負責掃地與整理文件，是否應該開設醫療系統的帳號給他？", "options": {"A": "A. 應該，方便他幫忙查資料。", "B": "B. 不應該，依據「最小權限原則」，若其職務無涉醫療業務，不應賦予系統存取權限。", "C": "C. 可以開一個「訪客」帳號給他。", "D": "D. 把院長的帳號借他用就好。"}, "answer": "B", "explanation": "最小權限原則（Least Privilege）：僅賦予員工完成工作所需的最小權限。清潔與整理文件無須接觸病歷系統，因此不應開設帳號，以降低個資外洩風險 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "建議多久更換一次高強度的登入密碼？", "options": {"A": "A. 從來不換。", "B": "B. 每天換。", "C": "C. 依據指引，建議每三個月（90天）更換一次。", "D": "D. 等到被駭客入侵後再換。"}, "answer": "C", "explanation": "密碼政策：定期更換密碼可降低密碼外洩後的損害期間。雖然現代資安觀點有時認為「不強制定期更換但要設很長」，但依據現行衛福部指引，仍建議定期（如 90 天）更換 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "當診所電腦系統提示「是否儲存密碼」在瀏覽器中時，對於存取病患資料的網站，應選擇？", "options": {"A": "A. 是，這樣下次登入比較快。", "B": "B. 否，切勿在瀏覽器儲存敏感系統的密碼。", "C": "C. 看心情。", "D": "D. 只有 Google Chrome 可以存。"}, "answer": "B", "explanation": "瀏覽器安全：瀏覽器儲存的密碼容易被惡意軟體竊取。對於涉及 PHI 的敏感系統，嚴禁使用瀏覽器的自動記憶密碼功能 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "依據衛福部資安指引，為了防止駭客使用自動化工具暴力破解密碼，診所醫療資訊系統應設定何種帳號鎖定機制？", "options": {"A": "A. 密碼輸入錯誤次數不限，方便老醫師多次嘗試。", "B": "B. 密碼輸入錯誤超過 5 次，應自動鎖定帳號至少 15 分鐘。", "C": "C. 密碼輸入錯誤 3 次後，電腦直接強制關機。", "D": "D. 只要輸入身分證字號，就可以無限次嘗試重設密碼。"}, "answer": "B", "explanation": "帳號鎖定政策：依據《基層醫療院所資安防護參考指引》，為防範暴力攻擊（Brute-force Attack），系統應具備「錯誤次數限制」。指引建議輸入錯誤超過 5 次即鎖定帳號 15 分鐘，這能有效大幅增加駭客非法嘗試的時間成本 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "轉診平台與醫療系統具備「稽核軌跡（Audit Log）」功能，其主要目的是落實哪一項資安原則？", "options": {"A": "A. 凡走過必留下痕跡：記錄操作的人、事、時、地、物，以供事後追查與釐清責任。", "B": "B. 監控員工效率：計算每位護理師處理轉診單的速度，作為績效獎金依據。", "C": "C. 節省硬碟空間：自動刪除過期的病歷資料。", "D": "D. 加快登入速度：系統自動記憶所有人的密碼。"}, "answer": "A", "explanation": "不可否認性與稽核：教材強調「凡走過必留下痕跡」。稽核軌跡能記錄所有存取、修改或查詢 PHI（個人健康資訊）的行為。當發生個資洩漏事件時，這些紀錄是釐清責任歸屬（是駭客入侵還是內部人為）最重要的法律證據 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "在設定診所內部電腦或各類醫務系統密碼時，下列哪一項行為是正確的資安實務？", "options": {"A": "A. 全診所的所有系統（掛號、健保 VPN、個人信箱）都使用同一組密碼，以免忘記。", "B": "B. 將密碼存在桌面的「密碼.txt」檔案中，方便隨時剪下貼上。", "C": "C. 針對不同重要性的網站與系統設定不同密碼，避免「一處破、處處破」的風險。", "D": "D. 密碼設定後就永久不換，除非電腦壞掉。"}, "answer": "C", "explanation": "密碼分權管理：指引建議「避免使用相同密碼於不同網站」。若診所電腦密碼與員工私人社群帳號相同，當私人帳號在外洩漏時，駭客就能輕易進入診所內網（撞庫攻擊）。落實密碼區隔是降低連鎖性資安災難的關鍵 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "關於帳號與密碼的「共用」行為，下列敘述何者最符合正確的資安規範？", "options": {"A": "A. 為了加速看診流程，醫師與跟診護理師共用一組高權限帳號是合法且受鼓勵的。", "B": "B. 診所共用公務帳號雖然方便，但會導致稽核紀錄無法辨識實際操作者，產生法律爭議。", "C": "C. 只要大家感情好，共用帳號不影響資安。", "D": "D. 健保 VPN 電腦因為只有內部人能碰，所以不用設個人帳號，用一個共用密碼即可。"}, "answer": "B", "explanation": "權責相符：帳號共用是診所資安的大忌。一旦發生個資外洩或病歷竄改，系統紀錄將只顯示該共用帳號，導致無法證明是誰操作，全體使用者可能皆須負擔連帶責任。因此教材與指引皆要求應「專人專號」。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "當診所員工（如護理師、行政人員）因離職或職務調動，不再接觸轉診業務時，診所管理者應如何處理其權限？", "options": {"A": "A. 保留帳號權限，方便該員工未來回來代班。", "B": "B. 應立即執行「帳號生命週期管理」，停用或刪除該員工的系統存取權限。", "C": "C. 將該帳號直接移交給接手的新員工，並維持原密碼。", "D": "D. 只要該員工口頭承諾不回來看資料，就可以不用去動權限。"}, "answer": "B", "explanation": "權限及時撤銷：依據「最小權限原則」，權限必須與現行職務相符。離職員工帳號若未即時停用（幽靈帳號），將成為極大的內賊風險，若發生資料竊取，診所將因未盡管理責任而面臨法律處分 。", "type": "主題四", "context": "密碼安全與權限管理"}, {"question": "病患打電話到診所，憤怒地質問為何在「臺南共照雲 APP」上看不到昨天的篩檢結果。行政人員最正確的應對方式為何？", "options": {"A": "A. 為了安撫病患，直接在電話中口頭告知報告結果。", "B": "B. 請病患加入診所私人的 LINE 群組，拍照片傳給他。", "C": "C. 安撫病患，說明需先確認身分，引導其檢查 APP 是否完成 OTP 認證，或請其攜帶證件至診所查詢。", "D": "D. 告知病患系統壞了，請他下週再打來。"}, "answer": "C", "explanation": "核心觀念：這是《個資法》第 3 條「查詢閱覽權」的行使。但在電話中難以確認來電者是否為本人（無法 eKYC），直接透露病情會構成洩密。正確做法是引導至具備身分驗證機制的官方 APP 或現場查驗證件 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "某診所護理師在診間覺得病患的傷口很特殊，於是拍照並上傳到個人的 Instagram 限時動態（已將臉部打馬賽克，但背景可看出診所名稱與病患特徵）。此行為是否違法？", "options": {"A": "A. 不違法，因為有打馬賽克。", "B": "B. 不違法，因為是為了學術研究分享。", "C": "C. 違法，可能違反《醫療法》與《個資法》，即便打碼，若能透過其他資訊間接識別身分，仍屬個資洩漏。", "D": "D. 只要病患沒看到就不算違法。"}, "answer": "C", "explanation": "個資定義：依據《個資法》定義，個資包含「直接或間接」識別個人的資料。且《醫療法》第 72 條規定醫療機構及其人員不得無故洩漏病人資訊。高雄牙醫截圖案即為前車之鑑，即使部分遮蔽，若可被連結至特定人（如透過預約時間、特徵），仍屬違法 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "診所櫃台人員在協助病患簽署「個資使用同意書」時，下列哪種說法是正確且合規的？", "options": {"A": "A. 「這只是例行公事，趕快簽名就好，內容不重要。」", "B": "B. 「這是為了讓您的資料能合法上傳到篩檢平台進行 AI 分析，請您詳閱後簽名。」", "C": "C. 「如果不簽這個，醫師就不會幫你看診。」", "D": "D. 「您可以不用簽名，我們會偷偷幫您蓋章。」"}, "answer": "B", "explanation": "告知後同意（Informed Consent）：依據《個資法》第 6 條及本計畫規範，蒐集特種個資（健康檢查）需經當事人書面同意。同意必須建立在充分告知目的、範圍與權利的基礎上，不能以欺騙或強迫方式取得。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "關於病患個資的蒐集，下列何者屬於「過度蒐集」或不必要之行為？", "options": {"A": "A. 蒐集病患的身分證字號以進行健保申報。", "B": "B. 蒐集病患的手機號碼以發送檢查通知。", "C": "C. 蒐集病患的詳細財務狀況與存款金額，以評估其自費能力。", "D": "D. 蒐集病患的過去病史以判斷篩檢風險。"}, "answer": "C", "explanation": "比例原則：個資蒐集應符合「特定目的」且「適當、相關且不過度」。存款金額與癌症篩檢醫療服務無直接關聯，不應蒐集。違反此原則可被視為違法蒐集 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "若診所不幸發生個資外洩事件（如病歷檔案遭竊），依據《個資法》規定，診所應採取何種措施？", "options": {"A": "A. 假裝沒發生，以免影響商譽。", "B": "B. 僅通報衛生局，不需要告訴病患。", "C": "C. 應查明後以適當方式（如信函、簡訊）通知當事人，並通報主管機關。", "D": "D. 立即解散診所並重新註冊。"}, "answer": "C", "explanation": "事故通知：依據《個資法》第 12 條，非公務機關違反本法規定，致個人資料被竊取、洩漏、竄改或其他侵害者，應查明後以適當方式通知當事人。這是為了讓當事人能採取防衛措施（如防詐騙）。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "病患要求診所刪除他在轉診平台上的所有資料，診所應該如何處理？", "options": {"A": "A. 立即刪除，因為個資法賦予當事人刪除權。", "B": "B. 置之不理。", "C": "C. 說明因涉及《醫療法》規定病歷保存年限（如至少 7 年），在法定保存期限內無法刪除，但可停止特定目的外之利用。", "D": "D. 收取高額手續費才刪除。"}, "answer": "C", "explanation": "權利限制：《個資法》第 11 條的刪除權並非絕對，第3項但書規定若「因執行職務或業務所必須」或「經當事人書面同意」者不在此限，。醫療法規對病歷保存有強制規定，此法定義務優先於刪除請求，診所應向病患妥善解釋 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "為了做學術研究，醫師可以將診所內的病歷資料直接拷貝回家分析嗎？", "options": {"A": "A. 可以，只要是為了醫學進步。", "B": "B. 不行，除非經過病患同意或經過嚴格的去識別化（De-identification）處理，且符合相關倫理審查規定。", "C": "C. 可以，只要不給別人看就好。", "D": "D. 看醫師心情。"}, "answer": "B", "explanation": "目的外利用：病歷蒐集的特定目的是「醫療照護」。學術研究屬於「目的外利用」。除非符合《個資法》第 16 條及第 6 條但書（如公務機關統計或學術研究且無從識別特定當事人），否則需另行取得同意 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "診所櫃台放置的「就診名單」讓所有排隊病患都能看到前面的人是誰、看什麼病，這是否妥當？", "options": {"A": "A. 妥當，方便病患知道進度。", "B": "B. 不妥當，應遮蔽姓名與診療科別等隱私資訊，避免病患間互相知悉就醫隱私。", "C": "C. 沒關係，大家都是鄰居。", "D": "D. 這是傳統，不能改。"}, "answer": "B", "explanation": "隱私保護：公開揭露就診名單涉及間接洩漏個資。建議僅顯示號碼或遮蔽部分姓名（如王O明），以兼顧便利與隱私 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "關於「去識別化（De-identification）」的概念，下列何者正確？", "options": {"A": "A. 只要把名字蓋掉就是去識別化。", "B": "B. 去識別化後的資料，若能透過代碼對照表還原，在診所內部仍應視為個資保護。", "C": "C. 去識別化後就可以隨意販售。", "D": "D. 只有身分證字號需要去識別化。"}, "answer": "B", "explanation": "技術定義：本計畫中的 AI 訓練資料需進行去識別化（移除直接識別符）。但若診所持有對照表（Re-identification Key），則該資料對診所而言仍屬個資，須受個資法規範 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "當檢警單位持公文要求調閱某病患的病歷時，診所應如何配合？", "options": {"A": "A. 拒絕提供，堅持保護病患隱私。", "B": "B. 核對公文與身分無誤後，依據《個資法》與《醫療法》配合提供，並留存紀錄。", "C": "C. 直接把整台電腦主機交給警察。", "D": "D. 打電話通知病患快逃。"}, "answer": "B", "explanation": "適法性：《個資法》允許「增進公共利益」或「公務機關執行法定職務」時利用個資。檢警調閱通常有法律依據（如刑事訴訟法）。診所應確認程序的合法性後配合，但僅提供相關部分，而非無限制提供 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "病患阿明認為診所記錄的聯絡電話有誤，要求更正。依據《個資法》第 3 條，診所應如何處理？", "options": {"A": "A. 拒絕更正，因為病歷一旦寫入就不能修改。", "B": "B. 要求阿明支付高額手續費才予以更正。", "C": "C. 確認阿明身分後，應依其請求准予補充或更正。", "D": "D. 告知阿明需自行聯絡衛生局修改。"}, "answer": "C", "explanation": "當事人權利：依據《個資法》第 3 條，當事人對於其個資享有「補充或更正」的權利。診所作為個資蒐集者，在核對身分無誤後，有義務確保資料的正確性並依請求更新 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "某保險業務員來到診所櫃台，宣稱已獲得病患授權，要求影印該病患的病理報告。櫃台人員應如何應對？", "options": {"A": "A. 為了服務病患，直接影印給業務員。", "B": "B. 請業務員提供病患親自簽署的「委託授權書」及雙方身分證明文件，經核對無誤後方可依程序提供。", "C": "C. 只要業務員能報出病患的身分證字號，就直接提供。", "D": "D. 叫業務員自己去病房找病患拿。"}, "answer": "B", "explanation": "委託查詢規範：涉及敏感個資（PHI）的釋出，診所必須嚴格執行身分查驗（eKYC）。委託他人查詢時，需有書面授權證明，否則隨意提供即違反《個資法》與《醫療法》對病患隱私的保護義務 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "關於「個資使用同意書」的簽署，下列何者符合「告知後同意（Informed Consent）」原則？", "options": {"A": "A. 同意書字體極小且夾雜在眾多文件夾層，不予說明即要求簽名。", "B": "B. 清楚告知病患資料將用於「臺南愛腸篩」計畫之篩檢與 AI 轉診分析，並說明其權利後請其簽署。", "C": "C. 告訴病患這只是掛號用的表格，不簽就不能掛號。 =", "D": "D. 診所直接代病患簽名以節省時間。"}, "answer": "B", "explanation": "蒐集合法性：本計畫蒐集特種個資（健康檢查）的核心基礎在於「當事人書面同意」。同意必須建立在「明確告知目的、範圍」的前提下，強制或隱瞞簽署皆會導致蒐集行為違法 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "診所為了方便民眾，將含有病患姓名與檢查結果的紙本清單直接釘在診間門口，這違反了什麼？", "options": {"A": "A. 違反《個資法》第 27 條未採行適當安全措施，導致個資遭無關第三人知悉。", "B": "B. 違反《傳染病防治法》。", "C": "C. 違反消防法規。", "D": "D. 沒有違反規定，是為了公告周知。"}, "answer": "A", "explanation": "安全維護措施：診所對保有之個資應採行防止被竊取、洩漏的措施。將隱私資訊公開張貼，等同於主動外洩病患就醫隱私，違反個資保護的管理責任。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "醫師在參與本計畫時，對於 AI 模型分析後產生的「去識別化」資料，下列何種行為是錯誤的？", "options": {"A": "A. 僅將其用於提升轉診與診斷準確率。", "B": "B. 嘗試透過院內系統的代碼，將去識別化後的資料重新對應還原出病患真實身分。", "C": "C. 確保資料傳輸過程符合 TLS 加密規範。", "D": "D. 遵循 ISO 29100 隱私保護標準進行處理。"}, "answer": "B", "explanation": "去識別化規範：計畫要求資料送往 AI 前需移除直接識別符。若人員惡意進行「再識別（Re-identification）」比對還原，等同於非法利用個資，將面臨法律責任 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "依據《個資法》第 41 條，若醫事人員「意圖為自己或第三人不法之利益」而盜賣病患名單，最高可能面臨？", "options": {"A": "A. 口頭警告。", "B": "B. 五年以下有期徒刑，並得併科新臺幣一百萬元以下罰金。", "C": "C. 罰款五百元。", "D": "D. 勞動服務。"}, "answer": "B", "explanation": "刑事責任：對於故意且具備不法意圖（如賣給藥商或保險業）的個資違法行為，個資法設有刑事處罰。這強調了個資保護不僅是行政問題，更是嚴肅的刑事紅線 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "病患要求診所提供其在計畫中的所有檢查紀錄「電子檔」備份。診所是否可以拒絕？", "options": {"A": "A. 可以，因為資料屬於診所財產。", "B": "B. 不可以，病患依據《個資法》第 3 條享有「製給複製本」的權利，診所應提供，但可酌收必要成本費用。", "C": "C. 只有院長同意才可以提供。", "D": "D. 要求病患先簽署切結書承諾不提告才提供。"}, "answer": "B", "explanation": "複製本提供：當事人有權要求副本。診所應落實病患的數位權利，協助其取得資料，此權利亦符合計畫中「民眾端 APP」的建置精神 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "在櫃台服務病患時，若電腦螢幕顯示著前一位病患的病歷資訊，行政人員正確的做法是？", "options": {"A": "A. 不理會，讓下一位病患自己看。", "B": "B. 立即將螢幕切換至首頁或鎖定螢幕，確保螢幕不對向民眾，避免隱私外洩。", "C": "C. 請病患幫忙核對前一個人的資料對不對。", "D": "D. 把螢幕亮度調到最暗。"}, "answer": "B", "explanation": "實體安全防護：依據《基層醫療院所資安防護參考指引》，設備擺放應避免螢幕對外，且在更換服務對象時應確保前一人隱私不被窺視。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "關於病患的「特種個資」，下列哪一項不屬於個資法第 6 條定義的範圍？", "options": {"A": "A. 健康檢查結果。", "B": "B. 醫療紀錄。", "C": "C. 病患的鞋子尺碼。", "D": "D. 基因資訊。"}, "answer": "C", "explanation": "特種個資定義：依據《個資法》第 6 條，包含病歷、醫療、基因、性生活、健康檢查及犯罪前科。鞋子尺碼屬一般個資，非屬高敏感的特種個資 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "當病患反應不願意再讓資料上傳至轉診平台進行 AI 運算時，診所應如何處理？", "options": {"A": "A. 強制要求病患必須參加。", "B": "B. 尊重病患意願，執行其「停止蒐集、處理或利用」之權利，並於系統標註。", "C": "C. 告訴病患資料已經上傳了，無法更改。", "D": "D. 要求病患支付罰金。"}, "answer": "B", "explanation": "停止利用權：當事人有權隨時撤回同意或要求停止利用其個資（除執行職務所必須外）。診所應尊重病患選擇，確保計畫在合法合規的基礎上運行 。", "type": "主題五", "context": "個資保護與病患權利"}, {"question": "診所收到一封標題為「衛生局公文：請儘速確認 114 年度篩檢補助款明細」的電子郵件，附檔為.exe 執行檔。正確的處理方式為何？", "options": {"A": "A. 標題看起來很重要，立刻點開附檔查看。", "B": "B. 轉寄給所有同事一起看。", "C": "C. 提高警覺，政府公文通常不會是.exe 檔，應致電衛生局確認，切勿開啟附檔。", "D": "D. 回信詢問寄件者是否為本人。"}, "answer": "C", "explanation": "社交工程：這是一起典型的釣魚郵件案例。駭客常偽冒權威機構（衛生局、健保署）。執行檔（.exe,.bat,.scr）是極高風險的檔案格式，絕不應隨意開啟。電話查證（Out-of-band verification）是破解詐騙的最佳手段。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "勒索病毒（Ransomware）的主要危害是什麼？", "options": {"A": "A. 偷走電腦螢幕。", "B": "B. 加密電腦內的檔案（如病歷資料庫），使其無法開啟，並勒索贖金。", "C": "C. 讓電腦速度變快。", "D": "D. 自動幫你發送廣告信。"}, "answer": "B", "explanation": "威脅本質：勒索病毒（如 WannaCry, Crazy Hunter）會使用高強度加密演算法鎖死檔案。醫療機構因資料即時性高（救命），常成為攻擊目標。其後果不僅是金錢損失，更會導致醫療服務中斷 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "為了防範勒索病毒綁架病歷資料，最有效的預防措施是落實「3-2-1 備份原則」。下列何者符合此原則？", "options": {"A": "A. 只備份在同一台電腦的 D 槽。", "B": "B. 備份三份資料，存放於兩種不同介質，其中一份要「離線」保存（Off-site/Offline）。", "C": "C. 每天把資料抄寫在紙本上。", "D": "D. 相信電腦絕對不會壞，不用備份。"}, "answer": "B", "explanation": "備份策略：勒索病毒會加密所有「連線中」的磁碟機（包含雲端硬碟、NAS）。唯有「離線備份」（如備份完拔除的外接硬碟）才能確保有一份乾淨的資料可供還原。這是資料保全的最後一道防線。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "當診所電腦螢幕突然跳出紅色警告視窗，顯示檔案已被加密鎖定並要求支付比特幣，下列處置步驟何者最正確？", "options": {"A": "A. 立即支付贖金，希望能拿回檔案。", "B": "B. 立即拔除網路線（斷網），不要急著關機或重灌，並通報資安廠商與主管機關。", "C": "C. 趕快用隨身碟把檔案備份出來到另一台電腦。", "D": "D. 大罵駭客並置之不理。"}, "answer": "B", "explanation": "應變SOP：\n1.斷網：防止病毒透過內網擴散到其他電腦或醫院端。\n2.不支付贖金：付錢不一定能拿回檔案，且助長犯罪。\n3.保留現場：記憶體中可能殘留金鑰，直接重灌會破壞鑑識證據。\n4.通報：依計畫規定需通報衛生局 。\n", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "為什麼不建議點擊簡訊或 Email 中的不明連結？", "options": {"A": "A. 因為會浪費流量。", "B": "B. 因為可能連結到釣魚網站或觸發「路過式下載（Drive-by Download）」，自動植入木馬程式。", "C": "C. 因為連結通常都很長，不好看。", "D": "D. 因為會讓手機沒電。"}, "answer": "B", "explanation": "攻擊手法：惡意連結是駭客入侵的起手式。透過瀏覽器漏洞或誘騙輸入帳密，駭客可輕易取得控制權。這也是診所資安教育中最需強調的「零信任」行為。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "如果發現診所的滑鼠游標自己會動，或是檔案自動被打開，可能發生了什麼事？", "options": {"A": "A. 滑鼠壞掉了。", "B": "B. 有鬼。", "C": "C. 電腦可能遭植入遠端控制木馬（RAT），駭客正在遠端操作。", "D": "D. 電腦在自動更新。"}, "answer": "C", "explanation": "入侵跡象：這是典型的遠端入侵徵兆。應立即斷網並請專業人員檢測。這通常源於使用了弱密碼的遠端桌面服務或中了木馬病毒。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "診所櫃台接到一通自稱是「系統維護廠商」的電話，對方說：「現在診所的健保連線有問題，請妳打開電腦的 AnyDesk 或 TeamViewer 遠端軟體，並唸出連線代碼與密碼給我，我要趕快修復。」行政人員最正確的反應是？", "options": {"A": "A. 趕快配合，因為健保連線很重要，不能中斷。", "B": "B. 請對方稍等，先掛斷電話，找出診所與廠商簽訂的合約上留存的官方電話「回撥查證」，確認是否真有此事。", "C": "C. 直接給他代碼，反正電腦裡沒有什麼秘密。", "D": "D. 請醫師來聽電話。"}, "answer": "B", "explanation": "社交工程（電話詐騙 Vishing）：駭客常偽冒廠商或IT人員，利用「緊急修復」的藉口騙取遠端連線權限。一旦交出 AnyDesk 密碼，駭客即可完全控制電腦植入病毒。\n防禦機制：落實「零信任」原則，透過「頻外查證（Out-of-band Verification）」，即不使用對方提供的聯絡方式，而是用自己已知可靠的管道（合約電話）進行確認 。\n", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "護理師的手機收到一則簡訊：「【健保署通知】您的健保卡資料異常，請於 24 小時內點擊連結更新資料，否則將停用卡片：http://nhi-gov.vip/login」。這最可能是什麼攻擊？", "options": {"A": "A. 這是真的健保署通知，要趕快點。", "B": "B. 這是「釣魚簡訊（Smishing）」，連結導向偽造的釣魚網站，目的是騙取個資與信用卡號。", "C": "C. 這是手機中毒的跡象。", "D": "D. 這是系統商的廣告。"}, "answer": "B", "explanation": "識別釣魚：政府機關網址通常以 .gov.tw 結尾。.vip、.cc 或亂碼網址通常是詐騙。駭客利用「停卡」、「罰款」等字眼製造恐慌（Fear Appeal），誘使受害者在偽造網站輸入個資 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "診所收到一封主旨為「某某病患的病歷資料補充」的 Email，內文寫著：「醫師您好，這是我在別家醫院的檢查報告，請您參考。」並附上一個 Word 檔。打開檔案後，Word 跳出黃色警告列提示「啟用內容（Enable Content）」才能看到內容。此時應如何處理？", "options": {"A": "A. 點擊「啟用內容」，才能看到病患資料。", "B": "B. 絕對不要點擊「啟用內容」或「啟用巨集」，這極可能是「巨集病毒（Macro Virus）」，一點擊就會自動下載勒索軟體。", "C": "C. 轉寄給其他醫師確認。", "D": "D. 回信罵對方。"}, "answer": "B", "explanation": "惡意文件：駭客常將惡意程式隱藏在 Office 文件的「巨集」指令碼中。一旦使用者依照指示點擊啟用，惡意程式就會在背景執行（如 Emotet），導致電腦遭竊密或加密。對於來源不明的檔案應保持高度警戒 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "醫師在停車場撿到一個標籤寫著「113年度員工薪資明細」的 USB 隨身碟。基於好奇心，醫師將它插上診所電腦想看看內容。這個行為稱為？", "options": {"A": "A. 拾金不昧。", "B": "B. USB 誘餌攻擊（USB Baiting）。", "C": "C. 資料救援。", "D": "D. 資源回收。"}, "answer": "B", "explanation": "物理社交工程：駭客故意遺棄含有惡意程式的 USB，利用人的「好奇心」或「貪念」誘使插入電腦。一旦插入，USB 會模擬鍵盤自動執行指令（BadUSB），植入後門程式，突破診所的防火牆 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "為了方便記憶，診所全體員工將轉診平台的登入密碼都設定成與自己的 Facebook、IG 密碼一模一樣。這會造成什麼資安風險？", "options": {"A": "A. 沒有風險，因為臉書很安全。", "B": "B. 撞庫攻擊（Credential Stuffing）風險。若臉書帳號在外洩事件中被竊，駭客會拿同一組帳密嘗試登入診所系統，導致連鎖駭入。", "C": "C. 會讓轉診平台變慢。", "D": "D. 違反著作權法。"}, "answer": "B", "explanation": "密碼重用風險：這是最常見的入侵管道之一。資安指引明確建議「避免使用相同密碼於不同網站」。公私帳號應嚴格區隔，避免一處受駭、全盤皆輸 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "診所收到一封來自「院長」的 Email，信中語氣急促地說：「我現在在開會不方便講電話，請幫我匯款 3 萬元到這個廠商帳戶，急件！」且信箱地址與院長的(dean@hospital.com)非常像（例如 dean@hospita1.com 或 dean@gmai1.com）。這是什麼攻擊？", "options": {"A": "A. 商業電子郵件詐騙（BEC, Business Email Compromise）。", "B": "B. 院長真的急需用錢。", "C": "C. 勒索病毒。", "D": "D. 阻斷服務攻擊。"}, "answer": "A", "explanation": "變臉詐騙：BEC 攻擊針對財務或行政人員，偽冒高階主管（CEO Fraud）要求緊急匯款。特徵是「利用權威」、「製造急迫感」且「不方便通話」。應堅持當面或電話核實 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "關於診所電腦瀏覽器的使用習慣，下列何者容易導致「路過式下載（Drive-by Download）」攻擊？", "options": {"A": "A. 僅瀏覽衛福部、健保署等公務網站。", "B": "B. 在看診空檔，使用診所電腦瀏覽免費影音網站、破解軟體論壇或色情網站。", "C": "C. 定期清除瀏覽紀錄。", "D": "D. 使用無痕模式。"}, "answer": "B", "explanation": "網頁掛馬：高風險網站（盜版、色情、免費資源）常被植入惡意廣告或腳本。使用者不需點擊任何東西，光是「瀏覽」網頁，電腦就可能利用瀏覽器漏洞自動下載並執行病毒。這也是落實「專機專用」的原因 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "近期台灣多家醫院（如馬偕、彰基）遭受駭客攻擊，主要原因之一是駭客利用了什麼弱點？", "options": {"A": "A. 醫院冷氣太冷。", "B": "B. 系統未修補漏洞（如舊版作業系統）與權限控管不當，導致駭客透過漏洞滲透並橫向移動。", "C": "C. 醫院沒有付保護費。", "D": "D. 醫師打字太慢。"}, "answer": "B", "explanation": "漏洞管理：依據近期資安鑑識報告，駭客常利用已知漏洞（如舊版 Windows、VPN 漏洞）入侵。未及時更新修補程式（Patching）是勒索病毒能大規模擴散的主因 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "若診所電腦不幸感染勒索病毒，為何資安專家強烈建議「不要支付贖金」？", "options": {"A": "A. 因為駭客很有錢，不需要我們的錢。", "B": "B. 因為支付贖金不保證能拿回解密金鑰，檔案可能救不回來，且支付贖金會資助犯罪集團，讓他們有資源攻擊更多醫療機構。", "C": "C. 因為比特幣很難買。", "D": "D. 因為健保會幫忙付。"}, "answer": "B", "explanation": "不付贖原則：統計顯示，支付贖金後仍有高比例無法完全復原資料。且一旦付款，診所會被標記為「肥羊」，未來遭重複攻擊的機率大增。正確做法是依賴離線備份還原 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "診所行政人員為了工作方便，在手機安裝了一個「免費 PDF 轉檔 App」，安裝時 App 要求授權「讀取聯絡人」、「讀取簡訊」、「存取相簿」等權限。這可能隱藏什麼風險？", "options": {"A": "A. 手機跑得比較快。", "B": "B. 該 App 可能是惡意程式，透過過度索取權限來竊取手機內的 OTP 簡訊或個資，導致帳號被盜。", "C": "C. 這是正常的，所有 App 都要這些權限。", "D": "D. 可以幫忙備份資料。"}, "answer": "B", "explanation": "行動資安：惡意 App 常偽裝成實用工具。若一個轉檔 App 要求讀取簡訊（可能含銀行或診所登入 OTP），這明顯違反「最小權限原則」，極可能是間諜軟體 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "醫師在診間自拍工作照上傳 Instagram，照片背景清楚拍到了電腦螢幕上的便利貼（寫著帳號密碼）以及作業系統版本（Windows 7）。這張照片暴露了哪些資安弱點？", "options": {"A": "A. 醫師很帥。", "B": "B. 洩漏密碼（實體安全漏洞）以及系統版本資訊（讓駭客知道該診所使用易受攻擊的舊系統），這是典型的「開源情資（OSINT）」洩漏。", "C": "C. 拍攝技術不好。", "D": "D. 沒有美肌。"}, "answer": "B", "explanation": "資訊洩漏：駭客蒐集情報（Reconnaissance）常透過社群媒體。螢幕上的便利貼直接送出密碼；舊系統畫面則暗示該診所有未修補的漏洞（如 BlueKeep），使其成為攻擊目標。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "診所發生資安事件（如勒索病毒感染）後，依據現行資安規範，第一時間的通報對象是？", "options": {"A": "A. 記者，先爆料再說。", "B": "B. 計畫執行單位與衛生局，依循正式的資安通報應變程序。", "C": "C. 鄰居的電腦高手。", "D": "D. 假裝不知道，等明天再說。"}, "answer": "B", "explanation": "通報義務：隱匿疫情會導致災情擴大。依據《資通安全管理法》與計畫契約，受駭單位有通報義務。通報可啟動區域聯防機制（如 H-ISAC），獲得外部專家的技術支援與情資分享 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "所謂的「零信任（Zero Trust）」資安架構，在診所日常操作中的具體精神是？", "options": {"A": "A. 懷疑所有同事都是壞人。", "B": "B. 「永不信任，始終驗證」。不論是來自內部還是外部的連線或郵件，都要預設可能帶有威脅，必須經過查證與授權。", "C": "C. 不要用電腦，只用紙本。", "D": "D. 相信防毒軟體會擋下所有攻擊。"}, "answer": "B", "explanation": "防禦觀念：傳統資安認為內網是安全的，但社交工程打破了這道牆。零信任強調即使是內部寄來的信（可能是 BEC）或內網的連線（可能是橫向移動），都不能無條件信任，需多重驗證 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "為了防範網站掛馬與惡意廣告攻擊，診所電腦除了安裝防毒軟體外，還建議定期執行什麼操作？", "options": {"A": "A. 重灌電腦。", "B": "B. 清洗鍵盤。", "C": "C. 執行作業系統與瀏覽器的「軟體更新（Update）」，修補已知漏洞。", "D": "D. 念經祈禱。"}, "answer": "C", "explanation": "漏洞修補：絕大多數的惡意廣告或網頁攻擊都是利用瀏覽器或 Flash/Java 的舊版漏洞。保持軟體在最新狀態（Patch Tuesday）是防範自動化攻擊最有效且成本最低的方法 。", "type": "主題六", "context": "社交工程與惡意程式防禦"}, {"question": "本次「M5 數位素養」課程的核心口訣，下列何者正確？", "options": {"A": "A. 卡片隨便借、密碼貼螢幕、網路吃到飽。", "B": "B. 卡片自己插（防偽造）、網路要分家（VPN 專用）、設備改密碼（防 IoT 入侵）。", "C": "C. 資料盡量傳、備份不用做、防毒太貴了。", "D": "D. 資安是工程師的事，跟我無關。"}, "answer": "B", "explanation": "深度解析： 這是教材結語的記憶口訣，總結了醫事人員卡（HCA）、網路隔離（VPN）與設備管理（IoT）三大重點。這三點是基層診所資安防護的最低底線，也是保護診所免於災難的護身符 。", "type": "總結", "context": "總結題"}];
const SITU_Q=[{"question": "關於王醫師將密碼貼在螢幕旁的行為，違反了資安防護的什麼原則？", "options": {"A": "A. 桌面淨空原則（Clear Desk Policy）。", "B": "B. 密碼保密原則與實體安全。", "C": "C. 資料備份原則。", "D": "D. 網路中立性原則。"}, "answer": "B", "explanation": "深度解析： 密碼不應以明文方式書寫並張貼於明顯處，這使得任何經過診間的人（包含清潔員、病患、廠商）都能輕易取得憑證控制權。這是最基本的密碼管理違規 。", "type": "情境1", "context": "忙碌診間的「權宜之計」\n週一上午，王醫師的診所病患爆滿。王醫師為了專心看診，將自己的醫事人員卡（HCA）插在讀卡機上，並將 PIN 碼寫在便利貼上貼在螢幕旁，指示護理師小美：「妳幫我處理轉診平台的資料上傳和電子簽章，我這邊忙不過來。」小美依照指示操作，順利完成了 10 筆轉診單的開立。"}, {"question": "針對王醫師授權小美代為操作 HCA 卡進行電子簽章的行為，下列法律分析何者正確？", "options": {"A": "A. 只要王醫師口頭授權，小美的行為就具有法律效力，不違法。", "B": "B. 這是診所內部行政流程，只要資料正確，不涉及法律問題。", "C": "C. 此行為破壞了電子簽章的「不可否認性」，若涉及健保申報不實，王醫師與小美可能共同觸犯《刑法》偽造文書罪及詐欺罪。", "D": "D. 僅違反醫院內規，最多被口頭警告。"}, "answer": "C", "explanation": "深度解析： 依據《電子病歷製作及管理辦法》及《刑法》第339條之4（加重詐欺罪） 或 第339條第2項（詐欺得利罪）實務見解，醫事人員卡需由本人親自使用。代刷卡、代簽章等同於偽造文書。若因此領取健保點數，更構成詐欺得利。這是第一層級（Violating Law）的嚴重違規 。", "type": "情境1", "context": "忙碌診間的「權宜之計」\n週一上午，王醫師的診所病患爆滿。王醫師為了專心看診，將自己的醫事人員卡（HCA）插在讀卡機上，並將 PIN 碼寫在便利貼上貼在螢幕旁，指示護理師小美：「妳幫我處理轉診平台的資料上傳和電子簽章，我這邊忙不過來。」小美依照指示操作，順利完成了 10 筆轉診單的開立。"}, {"question": "若小美在操作過程中，不小心將錯誤的病歷資料上傳，事後王醫師想否認是自己操作的，在法律上是否容易成立？", "options": {"A": "A. 容易，因為有監視器證明是小美按的鍵盤。", "B": "B. 不容易，因為電子簽章法推定憑證持有人為簽署人，除非王醫師能證明憑證遭竊，但他是主動交付密碼，故需承擔完全責任。", "C": "C. 容易，因為小美會出來自首。", "D": "D. 不容易，因為電腦會自動修正錯誤。"}, "answer": "B", "explanation": "深度解析： 電子憑證的法律效力在於推定本人簽署。主動交付密碼與卡片，代表王醫師自願承擔該卡片產生的所有法律後果，難以推卸責任。", "type": "情境1", "context": "忙碌診間的「權宜之計」\n週一上午，王醫師的診所病患爆滿。王醫師為了專心看診，將自己的醫事人員卡（HCA）插在讀卡機上，並將 PIN 碼寫在便利貼上貼在螢幕旁，指示護理師小美：「妳幫我處理轉診平台的資料上傳和電子簽章，我這邊忙不過來。」小美依照指示操作，順利完成了 10 筆轉診單的開立。"}, {"question": "阿強的行為違反了什麼核心規定？", "options": {"A": "A. 未違反規定，這是良好的醫病溝通。", "B": "B. 違反《個資法》與醫療隱私規範，未經確認身分即揭露病患敏感個資（病情）。", "C": "C. 違反《醫師法》，行政人員不得解釋病情，但可以告知結果。", "D": "D. 違反《勞基法》，因為講電話超過工時。"}, "answer": "B", "explanation": "深度解析： 在電話中無法確認發話者（eKYC）是否真為「兒子」及其是否獲病患授權。直接揭露病情（特種個資）屬於高風險洩密行為，可能導致家庭糾紛或病患隱私受損，診所可能面臨高額民事求償與行政裁罰。", "type": "情境2", "context": "熱心的櫃台人員\n櫃台行政人員阿強接到一通自稱是「陳大明病患兒子」的電話，語氣焦急地詢問爸爸的大腸癌篩檢結果是不是陽性，因為爸爸回家後心情很低落都不說話。阿強心想助人為快樂之本，查了電腦發現確實是陽性，便在電話中安慰對方：「是陽性沒錯，但早期發現治癒率很高，趕快帶爸爸來回診。」"}, {"question": "正確的處理流程應該是？", "options": {"A": "A. 請對方報出身分證字號，核對無誤後告知。", "B": "B. 堅持不能說，直接掛電話。", "C": "C. 告知對方基於個資法無法在電話中透露病情，請其協助病患使用「臺南共照雲 APP」查詢，或陪同病患本人攜帶證件至診所現場了解。", "D": "D. 加對方的 LINE 傳報告截圖給他。"}, "answer": "C", "explanation": "深度解析： 標準作業程序（SOP）應引導至具備身分驗證機制的管道（APP 或現場）。APP 具備帳號密碼與 OTP 機制，能確保是本人或授權者查詢，這既保障了隱私，也提供了服務 。", "type": "情境2", "context": "熱心的櫃台人員\n櫃台行政人員阿強接到一通自稱是「陳大明病患兒子」的電話，語氣焦急地詢問爸爸的大腸癌篩檢結果是不是陽性，因為爸爸回家後心情很低落都不說話。阿強心想助人為快樂之本，查了電腦發現確實是陽性，便在電話中安慰對方：「是陽性沒錯，但早期發現治癒率很高，趕快帶爸爸來回診。」"}, {"question": "張醫師的行為將診所暴露於何種風險？", "options": {"A": "A. 資料備份良好的風險。", "B": "B. 違反計畫「資料不落地」與「網路隔離」原則，且公有雲端服務伺服器多在境外，個資管控權限亦脫離診所掌握。", "C": "C. 違反著作權法。", "D": "D. 增加診所網路速度。"}, "answer": "B", "explanation": "深度解析： 將大量 PHI（個人健康資訊）上傳至未經計畫授權的公有雲（Dropbox, Google Drive），屬於嚴重的資料外洩風險。一旦張醫師的私人帳號被盜，所有病患資料將全部外洩。且這違反了健保 VPN 專機專用的原則 。", "type": "情境3", "context": "方便的雲端同步\n張醫師為了回家還能繼續研究病歷，在診所電腦安裝了個人的 Dropbox，並將含有病患姓名、身分證字號、病理報告的資料夾設定為「自動同步」到雲端，方便在家裡的 iPad 上閱讀。"}, {"question": "若這些資料在雲端外洩，依據《個資法》，誰要負損害賠償責任？", "options": {"A": "A. 只有 Dropbox 要負責。", "B": "B. 只有張醫師個人要負責。", "C": "C. 診所（非公務機關）作為個資保有者，若未善盡管理監督之責，需負連帶損害賠償責任，且張醫師亦有法律責任。", "D": "D. 政府要負責。"}, "answer": "C", "explanation": "深度解析： 診所負責人需承擔管理疏失責任。《個資法》第 29 條規定非公務機關違反本法致個人資料遭不法蒐集、處理、利用或其他侵害當事人權利者，負損害賠償責任。除非能證明已盡到所有應盡之防止義務 。《個資法》第29條 採「推定過失責任」（舉證責任倒置）。意即，若診所無法證明「已採行適當之安全措施」，就必須賠償。", "type": "情境3", "context": "方便的雲端同步\n張醫師為了回家還能繼續研究病歷，在診所電腦安裝了個人的 Dropbox，並將含有病患姓名、身分證字號、病理報告的資料夾設定為「自動同步」到雲端，方便在家裡的 iPad 上閱讀。"}, {"question": "此行為觸犯了哪條法律紅線？", "options": {"A": "A. 《刑法》公然侮辱罪。", "B": "B. 《醫療法》第 72 條無故洩漏病人資料及《個資法》第 41 條意圖損害他人利益。", "C": "C. 《商標法》。", "D": "D. 沒有觸法，只是內部員工分享。"}, "answer": "B", "explanation": "深度解析： 這是典型的「無故洩漏因業務知悉之秘密」。即便是在「內部」群組，LINE 伺服器並非診所管轄，且截圖極易流出。針對名人個資的洩漏，往往會被加重裁罰，甚至面臨刑事責任（如參考文獻 4 之案例）。", "type": "情境4", "context": "Line 群組的「個案討論」\n診所內部有一個「快樂工作群」LINE 群組。某日，護理師將一位名人的健保卡與轉診單拍照上傳群組，留言說：「哇！某某明星來我們診所做大腸篩檢耶！」其他同事紛紛按讚討論。"}, {"question": "診所負責人發現此事後，應採取何種補救措施？", "options": {"A": "A. 加入討論並按讚。", "B": "B. 要求立即收回訊息，截圖存證（作為懲處依據），並對全員進行資安機會教育，檢討員工保密協定落實度。", "C": "C. 裝作不知道。", "D": "D. 解散群組並開除所有員工。"}, "answer": "B", "explanation": "深度解析： 負責人有管理監督之責。立即制止損害擴大（收回訊息），並保留證據（以利後續責任釐清或通報），最後進行教育訓練與制度檢討，是標準的資安事件應變流程 。", "type": "情境4", "context": "Line 群組的「個案討論」\n診所內部有一個「快樂工作群」LINE 群組。某日，護理師將一位名人的健保卡與轉診單拍照上傳群組，留言說：「哇！某某明星來我們診所做大腸篩檢耶！」其他同事紛紛按讚討論。"}, {"question": "小陳的第一個動作應該是什麼？", "options": {"A": "A. 拔掉網路線（斷網）。", "B": "B. 趕快關機。", "C": "C. 大叫救命。", "D": "D. 拿手機拍照打卡。"}, "answer": "A", "explanation": "深度解析： 斷網是阻斷病毒橫向擴散至診所其他電腦或透過 VPN 感染醫院/健保署系統的最關鍵動作。這能防止災情擴大，保護整個醫療聯防體系 。", "type": "情境5", "context": "勒索病毒驚魂\n週五下班前，行政人員小陳想上網追劇，使用連接健保 VPN 的掛號電腦瀏覽了一個免費影音網站。突然電腦變慢，桌面檔案圖示全部變成白色，並跳出「WannaCry」勒索訊息。"}, {"question": "診所主管得知後，依據現行法規的規範，必須做什麼？", "options": {"A": "A. 隱匿不報，自行找人重灌。", "B": "B. 通報計畫執行單位與衛生局，並說明事件經過與處理狀況。", "C": "C. 支付比特幣給駭客。", "D": "D. 報警抓小陳。"}, "answer": "B", "explanation": "深度解析： 隱匿資安事件會導致主管機關無法評估整體風險（如是否已擴散至其他診所）。計畫契約與資通安全管理法均要求進行資安通報。通報不僅是義務，也能獲得外部技術支援。", "type": "情境5", "context": "勒索病毒驚魂\n週五下班前，行政人員小陳想上網追劇，使用連接健保 VPN 的掛號電腦瀏覽了一個免費影音網站。突然電腦變慢，桌面檔案圖示全部變成白色，並跳出「WannaCry」勒索訊息。"}, {"question": "依據《基層醫療院所資安防護參考指引》，診所應檢查什麼？", "options": {"A": "A. 檢查列印速度夠不夠快。", "B": "B. 檢查是否已修改原廠預設的管理者密碼（如 1111 或 admin）。", "C": "C. 檢查外觀有無刮傷。", "D": "D. 檢查紙張是否放滿。"}, "answer": "B", "explanation": "深度解析： 事務機是常被忽略的 IoT 資安破口。未改密碼的事務機可能被駭客用來攔截列印內容（病歷）或作為跳板攻擊內網。這是落實設備安全的基本檢查項目 1。", "type": "情境6", "context": "新設備的隱憂\n診所採購了一批新的多功能事務機（可影印、傳真、列印），廠商安裝好後就離開了。"}, {"question": "此行為違反了帳號管理的哪項原則？", "options": {"A": "A. 最小權限原則與帳號生命週期管理（離職即停用）。", "B": "B. 互信原則。", "C": "C. 備份原則。", "D": "D. 公平原則。"}, "answer": "A", "explanation": "深度解析： 離職員工帳號未停用是極大的內賊風險（Ghost Account）。資安標準要求員工離職當下即應註銷或停用其所有系統存取權限。若發生資料竊取，診所將因未盡管理責任而受罰 。", "type": "情境7", "context": "離職員工的權限\n護理師小華因故離職，診所經理認為大家關係很好，就沒有立即停用她在轉診平台的帳號，想說留著備用，也許她還會回來代班。"}, {"question": "若小華離職後，在家登入該帳號查詢病患資料並販售給保險業務員，診所需負什麼責任？", "options": {"A": "A. 完全無責任，是小華個人行為。", "B": "B. 需負未採行適當安全措施（未停用帳號）之責，可能面臨個資法裁罰與連帶賠償。", "C": "C. 只有保險業務員有責任。", "D": "D. 只有平台開發商有責任。"}, "answer": "B", "explanation": "深度解析： 診所未落實帳號管理（停用離職帳號），即屬於違反《個資法》第 27 條「未採行適當之安全措施」。這使得診所成為共犯結構的一部分，需承擔法律責任 。", "type": "情境7", "context": "離職員工的權限\n護理師小華因故離職，診所經理認為大家關係很好，就沒有立即停用她在轉診平台的帳號，想說留著備用，也許她還會回來代班。"}, {"question": "這個建議存在什麼資安風險？", "options": {"A": "A. 沒有風險，非常方便。", "B": "B. 遠端軟體若未設定強密碼或限制來源 IP，等同於幫駭客開後門，極易遭暴力破解入侵。", "C": "C. 會浪費電。", "D": "D. 會讓電腦螢幕壞掉。"}, "answer": "B", "explanation": "深度解析： 許多勒索病毒（如 Sodinokibi）即是透過未受保護的 RDP 或遠端軟體入侵。資安指引建議避免非必要的遠端連線，若必須使用，應採 VPN + 限制 IP + 強密碼 + 雙因子認證。廠商的方便往往是資安的災難 。", "type": "情境8", "context": "VPN 連線異常\n診所發現 VPN 連線經常中斷，IT 廠商建議安裝一個「遠端桌面軟體（如 AnyDesk 或 TeamViewer）」，讓他們可以從外面隨時連進來修電腦，且為了方便，設定為「無人值守存取」（免密碼或固定密碼）。"}, {"question": "這極可能是哪種攻擊？", "options": {"A": "A. 真的破盤價優惠。", "B": "B. 釣魚網站（Phishing），目的是騙取帳號密碼。", "C": "C. 系統更新通知。", "D": "D. 防毒軟體廣告。"}, "answer": "B", "explanation": "深度解析： 社交工程釣魚常利用貪小便宜心理。若輸入帳密，駭客可能取得該帳號權限，進而滲透診所關聯的雲端服務或信箱。掛號電腦不應進行私人網購，這也違反了專機專用原則 。", "type": "情境9", "context": "網購的誘惑\n醫師娘在櫃台使用掛號電腦，看到一個「破盤價！名牌包一折」的廣告，點進去後網頁要求輸入 Google 帳號密碼登入才能購買。"}, {"question": "若醫師娘不小心輸入了，應立即做什麼？", "options": {"A": "A. 趕快下單購買。", "B": "B. 立即在其他安全的電腦上更改該 Google 帳號密碼，並開啟雙因子認證。", "C": "C. 關機睡覺。", "D": "D. 刪除瀏覽紀錄就沒事了。"}, "answer": "B", "explanation": "深度解析： 帳密一旦輸入即已外洩。唯一補救方式是立即更改密碼並啟用 2FA，讓駭客取得的舊密碼失效。拖延時間只會增加資料被竊的風險。", "type": "情境9", "context": "網購的誘惑\n醫師娘在櫃台使用掛號電腦，看到一個「破盤價！名牌包一折」的廣告，點進去後網頁要求輸入 Google 帳號密碼登入才能購買。"}, {"question": "此行為有何不妥？", "options": {"A": "A. 很環保，值得鼓勵。", "B": "B. 違反個資保護，紙本病歷應以碎紙機銷毀，不得回收利用或隨意丟棄。", "C": "C. 便條紙太小張不好寫。", "D": "D. 違反廢棄物清理法。"}, "answer": "B", "explanation": "深度解析： 個資保護不僅限於數位資料。紙本資料若含有個資，報廢時必須經碎紙機銷毀至無法辨識。再利用或直接丟垃圾桶均屬違法洩漏。這是行政管理上容易被忽略的環節 。", "type": "情境10", "context": "紙本個資處理\n診所推動無紙化，整理出一批過期的紙本病歷影本與掛號清單。清潔阿姨覺得紙張背面還是白的很浪費，拿去做成便條紙給病患寫字。"}, {"question": "若診所沒有碎紙機，應如何處理這批資料？", "options": {"A": "A. 撕碎一點點丟垃圾桶。", "B": "B. 委託專業的機密文件銷毀公司處理，並簽署保密合約與銷毀證明。", "C": "C. 燒掉（造成空污）。", "D": "D. 送給回收阿婆。"}, "answer": "B", "explanation": "深度解析： 委外銷毀是常見做法，但必須落實「委外監督」，要求廠商提供銷毀證明與保密承諾。這符合《個資法》對於委託他人處理個資的監督規定 1。", "type": "情境10", "context": "紙本個資處理\n診所推動無紙化，整理出一批過期的紙本病歷影本與掛號清單。清潔阿姨覺得紙張背面還是白的很浪費，拿去做成便條紙給病患寫字。"}];

// ── YouTube IFrame API 偵測觀看進度 ──
var ytPlayer, ytDuration=0, ytTimer=null;

// YouTube API 載入完成後自動呼叫
function onYouTubeIframeAPIReady(){
  ytPlayer = new YT.Player('yt-player',{
    events:{
      'onReady': onYtReady,
      'onStateChange': onYtState
    }
  });
}

function onYtReady(e){
  ytDuration = ytPlayer.getDuration() || 0;
  document.getElementById('vtime').textContent = '準備就緒，請開始觀看';
}

function onYtState(e){
  // 1=播放, 2=暫停, 0=結束
  if(e.data === YT.PlayerState.PLAYING){
    if(!ytTimer) ytTimer = setInterval(updateYtProgress, 1000);
  } else {
    clearInterval(ytTimer); ytTimer = null;
  }
  if(e.data === YT.PlayerState.ENDED){
    updateYtProgress();
  }
}

function updateYtProgress(){
  if(!ytPlayer || !ytPlayer.getDuration) return;
  const dur = ytPlayer.getDuration();
  const cur = ytPlayer.getCurrentTime();
  if(dur <= 0) return;
  const pct = cur / dur;
  vidProg = cur; // 已觀看秒數

  document.getElementById('vprog').style.width = Math.min(pct*100,100)+'%';

  // 顯示時間
  const m = Math.floor(cur/60), s = Math.floor(cur%60);
  const tm = Math.floor(dur/60), ts = Math.floor(dur%60);
  document.getElementById('vtime').textContent =
    m+':'+String(s).padStart(2,'0')+' / '+tm+':'+String(ts).padStart(2,'0');

  if(pct >= CFG.VID_REQ && !vidOK){
    vidOK = true;
    clearInterval(ytTimer); ytTimer = null;
    document.getElementById('vstatus').textContent = '✓ 已達觀看門檻';
    document.getElementById('vstatus').style.color = 'var(--accent2)';
    unlockForm();
  } else if(!vidOK){
    const remain = Math.ceil((CFG.VID_REQ - pct) * dur);
    document.getElementById('vstatus').textContent = '還需約 '+remain+' 秒';
  }
}

function startVid(){
  // YouTube 模式：不使用模擬計時器，改由 YT API 觸發
  // 動態載入 YouTube IFrame API
  if(!window.YT){
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  } else if(window.YT && window.YT.Player) {
    onYouTubeIframeAPIReady();
  }
}
startVid();

function unlockForm(){
  // 表單預設開放填寫，影片完成後解鎖開始按鈕
  updateBtn();
}

function checkReturning(){
  const name=document.getElementById('f-name').value.trim();
  const clinic=document.getElementById('f-clinic').value.trim();
  const code=document.getElementById('f-code').value.trim();
  if(!name)return;
  const key=`quiz_rec_${name}_${clinic}_${code}`;
  const stored=localStorage.getItem(key);
  const banner=document.getElementById('returning-banner');
  if(stored){
    banner.style.display='flex';
    // 如果已觀看影片條件不滿足，也允許跳過影片
    if(!vidOK){
      vidOK=true;
      vidProg=CFG.VID_DUR;
      document.getElementById('vprog').style.width='100%';
      document.getElementById('vstatus').textContent='✓ 已驗證回測考生';
      document.getElementById('vstatus').style.color='var(--accent2)';
      document.getElementById('vtime').textContent='3:00 / 3:00';
      clearInterval(vidTimer);
      unlockForm();
    }
  }else{
    banner.style.display='none';
  }
  updateBtn();
}

function onFormInput(){
  checkReturning();
  updateBtn();
}

function updateBtn(){
  if(!vidOK){document.getElementById('start-btn').disabled=true;return;}
  const c=v('f-clinic'),co=v('f-code'),n=v('f-name'),t=v('f-title');
  const ok=c&&co&&n&&t;
  const btn=document.getElementById('start-btn');
  btn.disabled=!ok;
  btn.textContent=ok?'▶ 開始考試':'🔒 開始考試';
}
function v(id){return document.getElementById(id).value.trim();}

// ═══════════════════════════════════════════════
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// 將每題選項隨機排序，同時更新正確答案的 key
function shuffleOptions(q){
  const keys=['A','B','C','D'];
  const entries=shuffle(keys.map(k=>({key:k,text:q.options[k],isAnswer:k===q.answer})));
  const newOptions={};
  const newKeys=['A','B','C','D'];
  let newAnswer='A';
  entries.forEach((entry,i)=>{
    newOptions[newKeys[i]]=entry.text;
    if(entry.isAnswer)newAnswer=newKeys[i];
  });
  return {...q,options:newOptions,answer:newAnswer};
}

function tryStart(){
  regData={clinic:v('f-clinic'),code:v('f-code'),name:v('f-name'),title:v('f-title')};
  saveRecord(); // 開始考試即儲存，確保重做時不需重看影片
  clearInterval(vidTimer);
  const themeP=shuffle(THEME_Q).slice(0,CFG.THEME_N);
  const situP=shuffle(SITU_Q).slice(0,CFG.SITU_N);
  qs=shuffle([...themeP,...situP]).map(shuffleOptions);
  cur=0;ans={};
  document.getElementById('qtotal').textContent=qs.length;
  buildDots();
  showScreen('quiz-screen');
  renderQ();
}

function buildDots(){
  const c=document.getElementById('navdots');c.innerHTML='';
  qs.forEach((_,i)=>{
    const d=document.createElement('button');d.className='ndot';
    d.textContent=i+1;d.id='dot'+i;
    d.onclick=()=>goto(i);c.appendChild(d);
  });
}

function updateDots(){
  qs.forEach((_,i)=>{
    const d=document.getElementById('dot'+i);if(!d)return;
    d.className='ndot'+(ans[i]?' answered':'')+(i===cur?' current':'');
  });
  const n=Object.keys(ans).length;
  document.getElementById('anscount').textContent=n;
  document.getElementById('btnsubmit').disabled=(n<qs.length);
}

function goto(idx){if(idx<0||idx>=qs.length)return;cur=idx;renderQ();}

function renderQ(){
  const q=qs[cur];
  document.getElementById('qnum').textContent=cur+1;
  document.getElementById('qtype').textContent=q.type;
  document.getElementById('qtext').textContent=q.question;
  document.getElementById('qprog').style.width=((cur+1)/qs.length*100)+'%';
  document.getElementById('btnprev').disabled=(cur===0);
  document.getElementById('btnnext').disabled=(cur===qs.length-1);

  // 情境背景
  const ctxBox=document.getElementById('context-box');
  if(q.type.startsWith('情境')&&q.context){
    const lines=q.context.split('\n');
    const title=lines[0]||'';
    const body=lines.slice(1).join('\n').trim();
    document.getElementById('context-title').textContent=title;
    document.getElementById('context-body').textContent=body;
    ctxBox.style.display='block';
  }else{
    ctxBox.style.display='none';
  }

  const g=document.getElementById('optsgrid');g.innerHTML='';
  ['A','B','C','D'].forEach(k=>{
    const b=document.createElement('button');
    b.className='opt-btn'+(ans[cur]===k?' sel':'');
    b.innerHTML='<span class="opt-key">'+k+'</span><span>'+q.options[k]+'</span>';
    b.onclick=()=>selectAns(k);
    g.appendChild(b);
  });
  updateDots();
}

function selectAns(k){
  ans[cur]=k;
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{
    b.className='opt-btn'+((['A','B','C','D'][i])===k?' sel':'');
  });
  updateDots();
  if(cur<qs.length-1)setTimeout(()=>goto(cur+1),320);
}

function confirmSubmit(){
  const unanswered=qs.length-Object.keys(ans).length;
  const msg=unanswered>0
    ?`還有 ${unanswered} 題未作答，確定要繳交嗎？`
    :'確定繳交答卷？繳交後無法更改答案。';
  if(!confirm(msg))return;
  calcResult();
}

// ═══════════════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════════════
function calcResult(){
  showScreen('result-screen');
  let correct=0;
  qs.forEach((q,i)=>{if(ans[i]===q.answer)correct++;});
  const wrong=qs.length-correct;
  const pct=Math.round(correct/qs.length*100);
  const pass=pct>=CFG.PASS;
  document.getElementById('scorepct').textContent=pct+'%';
  document.getElementById('scorepct').className='score-num '+(pass?'pass':'fail');
  document.getElementById('rcorrect').textContent=correct;
  document.getElementById('rwrong').textContent=wrong;
  document.getElementById('rtotal').textContent=qs.length;
  const ring=document.getElementById('ringfill');
  ring.style.stroke=pass?'var(--accent2)':'var(--danger)';
  setTimeout(()=>{ring.style.strokeDashoffset=263.9*(1-pct/100);},200);

  if(pass){
    document.getElementById('rtitle').textContent='🎉 恭喜通過認證！';
    document.getElementById('rmsg').textContent='您已通過醫療院所資安認證考試，得分 '+pct+' 分（及格線 '+CFG.PASS+' 分）。';
    document.getElementById('btn-cert').style.display='inline-block';
    document.getElementById('email-section').style.display='block';
    syncToGSheet(pct,correct,wrong,true);
    launchConfetti();
    saveRecord();
  }else{
    document.getElementById('rtitle').textContent='繼續加油！';
    document.getElementById('rmsg').textContent='本次得分 '+pct+' 分，未達及格線（'+CFG.PASS+' 分）。建議查看解析後重新挑戰。';
    syncToGSheet(pct,correct,wrong,false);
  }
  document.getElementById('btn-retry').style.display=qs.some((q,i)=>ans[i]!==q.answer)?'inline-block':'none';
}

//  GOOGLE SHEETS SYNC
// ═══════════════════════════════════════════════
function syncToGSheet(score,correct,wrong,pass){
  if(!CFG.GSHEET_URL||CFG.GSHEET_URL==='YOUR_GOOGLE_APPS_SCRIPT_URL')return;
  const today=new Date();
  const dateStr=today.getFullYear()+'/'+(today.getMonth()+1).toString().padStart(2,'0')+'/'+today.getDate().toString().padStart(2,'0');
  const payload={
    name:regData.name,
    clinic:regData.clinic,
    code:regData.code,
    title:regData.title,
    score:score,
    correct:correct,
    wrong:wrong,
    pass:pass?'通過':'未通過',
    date:dateStr,
    time:today.toLocaleTimeString('zh-TW')
  };
  fetch(CFG.GSHEET_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).catch(e=>console.log('GSheet sync error:',e));
}

// ═══════════════════════════════════════════════
//  REVIEW
// ═══════════════════════════════════════════════
function showReview(){
  showScreen('review-screen');
  const list=document.getElementById('rv-list');list.innerHTML='';
  qs.forEach((q,idx)=>{
    const uk=ans[idx]||'（未作答）';
    const ok=uk===q.answer;
    const div=document.createElement('div');div.className='rv-item '+(ok?'ci':'wi');

    // 情境背景
    let ctxHTML='';
    if(q.type.startsWith('情境')&&q.context){
      const lines=q.context.split('\n');
      const ctitle=lines[0]||'';
      const cbody=lines.slice(1).join('\n').trim();
      ctxHTML=`<div class="rv-ctx"><div class="rv-ctx-lbl">📋 情境背景</div><div class="rv-ctx-txt"><strong>${ctitle}</strong>${cbody?'\n'+cbody:''}</div></div>`;
    }

    let optsHTML='';
    ['A','B','C','D'].forEach(k=>{
      let cls='rv-opt';
      if(k===q.answer)cls+=' oc';
      else if(k===uk&&!ok)cls+=' ow';
      optsHTML+=`<div class="${cls}"><span class="rv-key">${k}</span><span>${q.options[k]}</span></div>`;
    });
    div.innerHTML=`
      ${ctxHTML}
      <div class="rv-qhdr">
        <div class="rv-qnum">第 ${idx+1} 題 · ${q.type}</div>
        <div class="badge ${ok?'bc':'bw'}">${ok?'✓ 答對':'✗ 答錯'}</div>
      </div>
      <div class="rv-qtext">${q.question}</div>
      <div style="height:.7rem"></div>
      <div class="rv-opts">${optsHTML}</div>
      <div class="exp-box"><div class="exp-lbl">// 解析</div><div class="exp-txt">${q.explanation}</div></div>`;
    list.appendChild(div);
  });
}

function retryWrong(){
  const wqs=qs.filter((q,i)=>ans[i]!==q.answer);
  if(!wqs.length)return;
  qs=shuffle(wqs).map(shuffleOptions);cur=0;ans={};
  document.getElementById('qtotal').textContent=qs.length;
  buildDots();showScreen('quiz-screen');renderQ();
}

function restartAll(){
  // 判斷是否為已有紀錄的回測考生（regData 仍存在且有儲存紀錄）
  const hasRecord = regData.name && regData.clinic && regData.code &&
    localStorage.getItem('quiz_rec_'+regData.name+'_'+regData.clinic+'_'+regData.code);

  if(hasRecord){
    // 回測考生：保留資料，直接跳過影片，重新開始考試
    vidOK=true;
    vidProg=CFG.VID_DUR;
    document.getElementById('vprog').style.width='100%';
    document.getElementById('vstatus').textContent='✓ 已驗證回測考生';
    document.getElementById('vstatus').style.color='var(--accent2)';
    document.getElementById('vtime').textContent='3:00 / 3:00';
    clearInterval(vidTimer);
    // 保留表單資料並解鎖
    document.getElementById('reg-card').classList.remove('locked');
    document.getElementById('returning-banner').style.display='flex';
    document.getElementById('start-btn').disabled=false;
    document.getElementById('start-btn').textContent='▶ 開始考試';
    showScreen('intro-screen');

    // 新考生：完整重置，需重看影片

    document.getElementById('vprog').style.width='0%';
    document.getElementById('vtime').textContent='0:00 / 3:00';
    document.getElementById('vstatus').textContent='請觀看影片';
    document.getElementById('vstatus').style.color='';
    document.getElementById('start-btn').disabled=true;
    document.getElementById('start-btn').textContent='🔒 開始考試';
    document.getElementById('returning-banner').style.display='none';
    showScreen('intro-screen');
    startVid();
  }
}

// ═══════════════════════════════════════════════
//  CERTIFICATE
// ═══════════════════════════════════════════════
// Canvas 尺寸對應 PPT 6858000×9906000 EMU，比例 0.6923
// ═══════════════════════════════════════════════
//  CERTIFICATE  — 背景使用PPT渲染圖，文字精確疊加
// ═══════════════════════════════════════════════
// Canvas: 750×1083px（對應 PPT 6858000×9906000 EMU）
// 文字區塊座標由PPT EMU直接換算
// CERT_W/H 由 drawCert 內部動態計算（500×722）

function showCert(){
  document.getElementById('cert-overlay').classList.add('show');
  drawCert();
}
function closeCert(){ document.getElementById('cert-overlay').classList.remove('show'); }
function closeCertBg(e){ if(e.target===document.getElementById('cert-overlay')) closeCert(); }
function dlCert(){
  const a=document.createElement('a');
  a.download='醫療資安認證證書_'+regData.name+'.png';
  a.href=document.getElementById('cert-canvas').toDataURL('image/png');
  a.click();
}

function drawCert(){
  const canvas = document.getElementById('cert-canvas');
  // 底圖原始尺寸 1875×2709（直接從PDF渲染），顯示寬 500px
  const BG_W = 750, BG_H = 1083;
  const DISP_W = 500;
  const DISP_H = Math.round(DISP_W * BG_H / BG_W); // ≈722px
  canvas.width  = DISP_W;
  canvas.height = DISP_H;
  const ctx = canvas.getContext('2d');
  const sc = DISP_W / BG_W; // 縮放比例 ≈0.267

  const today = new Date();
  const ds = today.getFullYear() + '/' +
             String(today.getMonth()+1).padStart(2,'0') + '/' +
             String(today.getDate()).padStart(2,'0');
  const no = 'NO.' + String(Math.floor(Math.random()*900000)+100000);

  // 底圖座標（1875×2709）直接量測，乘sc換算顯示座標
  // 字型大小同樣由底圖量測值×sc
  const SZ = {
    h1:   Math.round(88 * sc),   // 測驗通過證明
    sub:  Math.round(65 * sc),   // 副標題
    body: Math.round(72 * sc),   // 姓名+正文
    date: Math.round(42 * sc),   // 頒發日期
    tiny: Math.round(35 * sc),   // 電子證明+NO
  };

  const P = {
    tx:   Math.round(215  * sc), ty:   Math.round(823  * sc), // 測驗通過證明
    sx:   Math.round(937  * sc), sy:   Math.round(1064 * sc), // 副標題置中x,y
    slh:  Math.round(70   * sc),                              // 副標題行高
    bx:   Math.round(202  * sc), by:   Math.round(1301 * sc), // 姓名+正文
    bw:   Math.round(1460 * sc),                              // 正文最大寬
    blh:  Math.round(118  * sc),                              // 正文行高
    dy:   Math.round(2317 * sc),                              // 頒發日期
    ey_:  Math.round(2400 * sc),                              // 電子證明
    ny:   Math.round(2465 * sc),                              // NO.
  };

  const F = {
    h1:   'bold ' + SZ.h1   + 'px "Noto Sans TC","標楷體",serif',
    sub:             SZ.sub  + 'px "Noto Sans TC","標楷體",serif',
    body:            SZ.body + 'px "Noto Sans TC","標楷體",serif',
    date:            SZ.date + 'px "Noto Sans TC","標楷體",serif',
    tiny:            SZ.tiny + 'px "Noto Sans TC","標楷體",serif',
  };
  const COLOR = '#1a1a1a';
  const CX = Math.round(937 * sc); // 水平中心

  const bgImg = new Image();
  bgImg.onload = function(){
    ctx.drawImage(bgImg, 0, 0, DISP_W, DISP_H);
    ctx.textBaseline = 'top';

    // ── 1. 測驗通過證明（左對齊）
    ctx.font = F.h1;
    ctx.fillStyle = COLOR;
    ctx.textAlign = 'left';
    ctx.fillText('測驗通過證明', P.tx, P.ty);

    // ── 2. 副標題 3行（置中）
    ctx.font = F.sub;
    ctx.fillStyle = COLOR;
    ctx.textAlign = 'center';
    ctx.fillText('「健康台灣深耕計畫」',            CX, P.sy);
    ctx.fillText('臺南愛(AI)腸篩－大腸癌擴篩完治', CX, P.sy + P.slh);
    ctx.fillText('×AI轉診智慧平台精進計畫',         CX, P.sy + P.slh * 2);

    // ── 3. 姓名（左對齊，自動換行）
    // 格式：姓　　名：王小明（診所名稱　職稱）
    const nameStr = '姓　　名：' + regData.name +
                    '（' + regData.clinic + '　' + regData.title + '）';
    let nextY = certWrap(ctx, nameStr, F.body, P.bx, P.by, P.bw, P.blh, COLOR);

    // ── 4. 正文
    const bodyTxt = '確已參加本計畫所辦理之種子教師資格測驗，並經審核認定成績合格，特此證明。';
    certWrap(ctx, bodyTxt, F.body, P.bx, nextY + Math.round(8 * sc), P.bw, P.blh, COLOR);

    // ── 5. 頒發日期（置中）
    ctx.font = F.date;
    ctx.fillStyle = COLOR;
    ctx.textAlign = 'center';
    ctx.fillText('頒發日期：' + ds, CX, P.dy);

    // ── 6. 電子證明
    ctx.font = F.tiny;
    ctx.fillText('（本證書為系統自動生成之電子證明）', CX, P.ey_);

    // ── 7. NO.
    ctx.fillText(no, CX, P.ny);
  };
  bgImg.src = IMGS.certbg;
}

function certWrap(ctx, text, font, x, y, maxW, lineH, fill){
  ctx.font = font;
  ctx.fillStyle = fill;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const chars = text.split('');
  let line = '';
  let curY = y;
  for(let i=0; i<chars.length; i++){
    const test = line + chars[i];
    if(ctx.measureText(test).width > maxW && line){
      ctx.fillText(line, x, curY);
      line = chars[i];
      curY += lineH;
    } else {
      line = test;
    }
  }
  if(line) ctx.fillText(line, x, curY);
  return curY + lineH;
}

function launchConfetti(){
  const cols=['#00d4ff','#00ff9d','#ffb830','#ff4d6a','#fff'];
  const c=document.getElementById('confetti');c.innerHTML='';
  for(let i=0;i<80;i++){
    const p=document.createElement('div');p.className='confetti-p';
    p.style.left=Math.random()*100+'vw';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'0';
    p.style.animationDuration=(2+Math.random()*3)+'s';
    p.style.animationDelay=(Math.random()*1.5)+'s';
    c.appendChild(p);
  }
  setTimeout(()=>{c.innerHTML='';},5000);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
